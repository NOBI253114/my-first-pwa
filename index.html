<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4M TASK - ULTIMATE v2.1.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #10b981; --primary-dark: #059669; --bg: #f1f5f9;
            --text-main: #1e293b; --text-sub: #64748b; --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --status-wait: #ef4444; --status-doing: #f59e0b; --status-done: #10b981;
        }
        body { font-family: 'Kanit', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 50px; }
        .app-header { background: #fff; padding: 20px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .nav-tabs { display: flex; padding: 15px; gap: 8px; position: sticky; top: 0; background: var(--bg); z-index: 100; justify-content: center; }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 12px; background: #fff; color: var(--text-sub); cursor: pointer; transition: 0.3s; box-shadow: var(--shadow); font-family: 'Kanit'; font-weight: 500; }
        .tab-btn.active { background: var(--primary); color: #fff; transform: translateY(-2px); }
        .container { max-width: 700px; margin: 0 auto; padding: 0 15px; }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; box-shadow: var(--shadow); margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #e2e8f0; font-family: 'Kanit'; box-sizing: border-box; font-size: 1rem; outline: none; }
        .btn-main { background: var(--primary); color: #fff; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-main:hover { background: var(--primary-dark); }
        .month-header { background: #dcfce7; color: var(--primary-dark); padding: 8px 18px; border-radius: 20px; display: inline-block; margin: 20px 0 10px 0; font-size: 0.9rem; font-weight: 700; }
        .task-card { background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: var(--shadow); position: relative; }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin: 10px 0; }
        .gallery img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; }
        .action-btns { display: flex; gap: 10px; margin-top: 10px; justify-content: flex-end; }
        .btn-edit { color: var(--primary); background: none; border: 1px solid var(--primary); padding: 4px 12px; border-radius: 8px; cursor: pointer; font-family: 'Kanit'; font-size: 0.8rem; }
        .btn-del { color: #ef4444; background: none; border: 1px solid #ef4444; padding: 4px 12px; border-radius: 8px; cursor: pointer; font-family: 'Kanit'; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="app-header">
        <h1>4M TASK</h1>
        <div style="font-size: 0.7rem; color: var(--text-sub);">Version 2.1.0 | Edit, Delete & Smart Sort | นาย ธิติ พุกวิลัย</div>
    </div>

    <div class="nav-tabs">
        <button id="btn-add" class="tab-btn active" onclick="showSection('add')">➕ เพิ่มงาน</button>
        <button id="btn-view" class="tab-btn" onclick="showSection('view')">📁 คลังงาน</button>
        <button id="btn-dash" class="tab-btn" onclick="showSection('dash')">📊 สรุปผล</button>
    </div>

    <div class="container">
        <div id="section-add" class="page-section active">
            <div class="glass-card">
                <h3 id="form-title" style="margin-top:0;">เพิ่มงานใหม่</h3>
                <input type="hidden" id="editId">
                <input type="text" id="taskFullInput" placeholder="เลข-เดือน ชื่องาน (เช่น 01-21 งานทางหลวง)">
                <button onclick="document.getElementById('cameraInput').click()" style="width:100%; padding:10px; border:2px dashed #ccc; border-radius:10px; background:none; margin-bottom:15px; cursor:pointer; font-family: 'Kanit';">📸 แนบรูปถ่าย</button>
                <input type="file" id="cameraInput" accept="image/*" multiple style="display:none;">
                <div id="preview-area" style="display:flex; gap:8px; overflow-x:auto; margin-bottom:10px;"></div>
                <textarea id="taskDetail" rows="3" placeholder="รายละเอียดเพิ่มเติม"></textarea>
                <select id="taskStatus">
                    <option value="รอดำเนินการ">🔴 รอดำเนินการ</option>
                    <option value="กำลังทำ">🟡 กำลังทำ</option>
                    <option value="เสร็จสิ้น">🟢 เสร็จสิ้น</option>
                </select>
                <button id="btn-save" class="btn-main" onclick="addTask()">บันทึกข้อมูล</button>
                <button id="btn-cancel" class="btn-del" style="width:100%; margin-top:10px; display:none;" onclick="cancelEdit()">ยกเลิกการแก้ไข</button>
            </div>
        </div>

        <div id="section-view" class="page-section">
            <input type="text" id="searchInput" placeholder="ค้นหาชื่องาน หรือ ORS..." onkeyup="filterTasks()" style="width:100%; padding:12px; border-radius:10px; border:1px solid #e2e8f0; margin-bottom:15px; font-family:'Kanit';">
            <div id="task-container"></div>
        </div>

        <div id="section-dash" class="page-section">
            <div class="glass-card"><canvas id="statusChart"></canvas></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBwNltx2biA-AdM44HjHay-4gO4N1RH_sQ", authDomain: "mytaskapp-pro.firebaseapp.com", projectId: "mytaskapp-pro", storageBucket: "mytaskapp-pro.firebasestorage.app", messagingSenderId: "189296604432", appId: "1:189296604432:web:31dabc3c5e363b2c96a195" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allTasks = [], selectedPhotos = [];
        const monthNames = ["", "มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

        window.showSection = (name) => {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('section-' + name).classList.add('active');
            document.getElementById('btn-' + name).classList.add('active');
        };

        // ฟังก์ชันเรียงลำดับตามเลขหลัง ORS.XX/YY (เรียงตาม YY)
        function sortTasks(tasks) {
            return tasks.sort((a, b) => {
                const getNum = (ors) => parseInt(ors.split('/')[1]) || 0;
                return getNum(a.ors) - getNum(b.ors);
            });
        }

        window.addTask = async () => {
            const raw = document.getElementById('taskFullInput').value;
            const editId = document.getElementById('editId').value;
            if(!raw) return alert("กรุณากรอกข้อมูลงาน");

            const match = raw.match(/^(\d{1,2})\s*[-/]\s*(\d{1,2})\s+(.*)$/);
            const ors = match ? `ORS.${match[1]}/${match[2]}` : "ORS.00/00";
            const title = match ? match[3].trim() : raw;

            const data = {
                ors, title, detail: document.getElementById('taskDetail').value,
                status: document.getElementById('taskStatus').value,
                updatedAt: new Date().getTime()
            };
            if(selectedPhotos.length > 0) data.photos = selectedPhotos;

            if(editId) {
                await updateDoc(doc(db, "tasks", editId), data);
                alert("แก้ไขข้อมูลเรียบร้อย!");
            } else {
                data.createdAt = new Date().getTime();
                await addDoc(collection(db, "tasks"), data);
                alert("บันทึกข้อมูลเรียบร้อย!");
            }
            location.reload();
        };

        window.editTask = (id) => {
            const t = allTasks.find(x => x.id === id);
            document.getElementById('editId').value = t.id;
            document.getElementById('taskFullInput').value = `${t.ors.replace('ORS.','').replace('/','-')} ${t.title}`;
            document.getElementById('taskDetail').value = t.detail || "";
            document.getElementById('taskStatus').value = t.status;
            document.getElementById('form-title').innerText = "แก้ไขข้อมูลงาน";
            document.getElementById('btn-cancel').style.display = "block";
            showSection('add');
        };

        window.deleteTask = async (id) => {
            if(confirm("คุณแน่ใจหรือไม่ว่าต้องการลบงานนี้?")) {
                await deleteDoc(doc(db, "tasks", id));
                alert("ลบงานเรียบร้อยแล้ว");
            }
        };

        window.cancelEdit = () => location.reload();

        onSnapshot(query(collection(db, "tasks")), (snap) => {
            allTasks = sortTasks(snap.docs.map(d => ({ id: d.id, ...d.data() })));
            filterTasks();
        });

        window.filterTasks = () => {
            const container = document.getElementById('task-container');
            container.innerHTML = ""; let lastM = "";
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            allTasks.filter(t => t.title.toLowerCase().includes(search) || t.ors.includes(search)).forEach(t => {
                const mNum = parseInt(t.ors.split('.')[1]?.split('/')[0]) || 0;
                const mName = monthNames[mNum] || "ทั่วไป";
                let c = t.status === "เสร็จสิ้น" ? "var(--status-done)" : (t.status === "กำลังทำ" ? "var(--status-doing)" : "var(--status-wait)");
                
                if (lastM !== mName) { lastM = mName; container.innerHTML += `<div class="month-header">📅 เดือน${mName}</div>`; }
                container.innerHTML += `
                    <div class="task-card" style="border-left: 6px solid ${c}">
                        <div style="display:flex; justify-content:space-between; font-size:0.85rem;">
                            <b>${t.ors}</b> <span style="color:${c}; font-weight:600;">${t.status}</span>
                        </div>
                        <div style="margin:10px 0; font-weight:600;">${t.title}</div>
                        <div class="gallery">${(t.photos||[]).map(p => `<img src="${p}">`).join('')}</div>
                        <div class="action-btns">
                            <button class="btn-edit" onclick="editTask('${t.id}')">✏️ แก้ไข</button>
                            <button class="btn-del" onclick="deleteTask('${t.id}')">🗑️ ลบ</button>
                        </div>
                    </div>`;
            });
        };

        document.getElementById('cameraInput').onchange = (e) => {
            for (let f of e.target.files) {
                const r = new FileReader();
                r.onload = (ev) => {
                    selectedPhotos.push(ev.target.result);
                    const i = document.createElement('img'); i.src = ev.target.result;
                    i.style = "width:50px; height:50px; object-fit:cover; border-radius:5px;";
                    document.getElementById('preview-area').appendChild(i);
                };
                r.readAsDataURL(f);
            }
        };
    </script>
</body>
</html>
