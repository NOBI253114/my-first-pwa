<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4M TASK - Beta 1.4 Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #6366f1; --primary-light: #818cf8; --secondary: #10b981;
            --dark: #0f172a; --glass: rgba(255, 255, 255, 0.85);
            --shadow-sm: 0 10px 15px -3px rgba(0,0,0,0.1);
            --status-wait: #f43f5e; --status-doing: #fbbf24; --status-done: #10b981;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Kanit', sans-serif; margin: 0; background: #f8fafc;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh; color: var(--dark); padding-bottom: 80px;
        }

        /* UI Background Decoration */
        body::before {
            content: ""; position: fixed; top: -10%; left: -10%; width: 40%; height: 40%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            z-index: -1; filter: blur(50px);
        }

        .app-header { 
            padding: 30px 20px; text-align: center; background: rgba(255,255,255,0.4);
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.5);
            box-shadow: var(--shadow-sm);
        }
        .app-header h1 { margin: 0; font-weight: 700; letter-spacing: 2px; color: var(--primary); font-size: 1.8rem; }
        .version-tag { font-size: 0.7rem; background: var(--primary); color: #fff; padding: 2px 10px; border-radius: 20px; display: inline-block; margin-top: 5px; }

        .nav-tabs { 
            display: flex; justify-content: center; gap: 10px; padding: 15px; 
            position: sticky; top: 0; z-index: 100; backdrop-filter: blur(15px);
        }
        .tab-btn { 
            padding: 12px 18px; border: none; border-radius: 16px; background: var(--glass);
            color: var(--dark); font-family: 'Kanit'; font-weight: 500; cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: var(--shadow-sm);
            border: 1px solid rgba(255,255,255,0.6);
        }
        .tab-btn.active { background: var(--primary); color: #fff; transform: scale(1.05); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }

        .container { max-width: 650px; margin: 0 auto; padding: 0 15px; }
        
        /* Card & Forms */
        .glass-card { 
            background: var(--glass); backdrop-filter: blur(20px); border-radius: 28px;
            padding: 25px; border: 1px solid rgba(255,255,255,0.7);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05); margin-bottom: 25px;
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        input, textarea, select { 
            width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 14px;
            border: 1px solid rgba(0,0,0,0.05); background: rgba(255,255,255,0.8);
            font-family: 'Kanit'; font-size: 1rem; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

        .btn-main { 
            background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%);
            color: #fff; border: none; padding: 16px; border-radius: 18px; width: 100%;
            font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 1.1rem;
        }
        .btn-main:active { transform: scale(0.98); }

        /* Task Cards */
        .month-header { 
            background: rgba(99, 102, 241, 0.1); color: var(--primary);
            padding: 15px 20px; border-radius: 18px; display: flex;
            justify-content: space-between; align-items: center; margin: 25px 0 12px 0;
            font-weight: 600; cursor: pointer; border: 1px solid rgba(99, 102, 241, 0.1);
        }
        .task-card { 
            background: #fff; border-radius: 22px; padding: 20px; margin-bottom: 18px;
            box-shadow: var(--shadow-sm); border: 1px solid transparent; transition: 0.3s;
        }
        .task-card:hover { transform: translateY(-3px); border-color: rgba(99, 102, 241, 0.2); }
        
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0; }
        .gallery img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 12px; transition: 0.3s; }
        .gallery img:hover { transform: scale(1.05); }

        /* Admin Floating */
        .admin-fab { 
            position: fixed; bottom: 25px; right: 25px; width: 55px; height: 55px;
            background: var(--dark); color: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); cursor: pointer; z-index: 500; font-size: 22px;
        }

        /* Edit Modal Add Photos Area */
        .edit-photo-ctrl { background: #f1f5f9; padding: 10px; border-radius: 12px; margin-bottom: 15px; }

        .modal-content { 
            background: #fff; padding: 30px; border-radius: 30px; width: 92%; 
            max-width: 450px; animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalPop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .preview-area { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; }
        .preview-item { position: relative; flex-shrink: 0; }
        .preview-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 15px; border: 2px solid #fff; box-shadow: var(--shadow-sm); }
        .remove-btn { position: absolute; top: -5px; right: -5px; background: #f43f5e; color: #fff; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-weight: bold; }
        
        .device-badge { font-size: 0.75rem; background: #f1f5f9; padding: 8px 12px; border-radius: 12px; color: #64748b; margin-top: 15px; display: block; }
    </style>
</head>
<body>

    <div class="app-header">
        <h1>4M TASK</h1>
        <div class="version-tag">Beta 1.4 Premium</div>
        <div id="admin-indicator" style="display:none; color: var(--secondary); font-size: 0.8rem; font-weight: bold; margin-top:5px;">🛡️ ADMIN MODE</div>
    </div>

    <div class="nav-tabs">
        <button id="btn-add" class="tab-btn active" onclick="showSection('add')">✨ เพิ่มงาน</button>
        <button id="btn-view" class="tab-btn" onclick="showSection('view')">📂 คลังงาน</button>
        <button id="btn-dash" class="tab-btn" onclick="showSection('dash')">📊 สถิติ</button>
        <button id="btn-logs" class="tab-btn" onclick="showSection('logs')" style="display:none;">📜 ล็อก</button>
    </div>

    <div class="container">
        <div id="section-add" class="page-section active">
            <div class="glass-card">
                <h3 style="margin-top:0;">🚀 สร้างงานใหม่</h3>
                <input type="text" id="taskFullInput" placeholder="เลข-เดือน ชื่องาน (เช่น 05-21 ติดตั้งระบบ)">
                <button onclick="document.getElementById('cameraInput').click()" class="btn-main" style="background:#fff; color:var(--primary); border:2px dashed var(--primary); margin-bottom:15px;">📸 เพิ่มรูปถ่ายงาน</button>
                <input type="file" id="cameraInput" accept="image/*" multiple style="display:none;">
                <div id="preview-area" class="preview-area"></div>
                <textarea id="taskDetail" rows="3" placeholder="ระบุรายละเอียด..."></textarea>
                <select id="taskStatus">
                    <option value="รอดำเนินการ">🔴 รอดำเนินการ</option>
                    <option value="กำลังทำ">🟡 กำลังทำ</option>
                    <option value="เสร็จสิ้น">🟢 เสร็จสิ้น</option>
                </select>
                <button class="btn-main" id="saveBtn" onclick="addTask()">ยืนยันบันทึกข้อมูล</button>
            </div>
        </div>

        <div id="section-view" class="page-section">
            <input type="text" id="searchInput" placeholder="🔍 ค้นหาเลข ORS หรือ ชื่องาน..." onkeyup="filterTasks()">
            <div id="task-container"></div>
        </div>

        <div id="section-dash" class="page-section">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:20px;">
                <div class="glass-card" style="text-align:center; padding:20px; margin-bottom:0;"><div id="stat-total" style="font-size:2rem; font-weight:700;">0</div><div style="color:var(--text-sub)">รวม</div></div>
                <div class="glass-card" style="text-align:center; padding:20px; margin-bottom:0;"><div id="stat-done" style="font-size:2rem; font-weight:700; color:var(--secondary)">0</div><div style="color:var(--text-sub)">สำเร็จ</div></div>
            </div>
            <div class="glass-card" style="padding:40px;"><canvas id="statusChart"></canvas></div>
            <button class="btn-main" style="background:var(--secondary)" onclick="exportToExcel()">📗 ดาวน์โหลดไฟล์ Excel</button>
        </div>

        <div id="section-logs" class="page-section">
            <div id="log-container"></div>
        </div>
    </div>

    <div id="editModal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin-top:0;">📝 แก้ไขงาน</h3>
            <input type="text" id="editFullInput">
            <textarea id="editDetail" rows="3"></textarea>
            
            <div class="edit-photo-ctrl">
                <div style="font-size:0.8rem; margin-bottom:5px; font-weight:600;">รูปภาพในระบบ:</div>
                <div id="edit-preview-area" class="preview-area"></div>
                <button onclick="document.getElementById('editCameraInput').click()" style="width:100%; padding:8px; border-radius:10px; border:1px solid #ddd; background:#fff; cursor:pointer;">➕ เพิ่มรูปใหม่</button>
                <input type="file" id="editCameraInput" accept="image/*" multiple style="display:none;">
            </div>

            <select id="editStatus"><option value="รอดำเนินการ">🔴 รอดำเนินการ</option><option value="กำลังทำ">🟡 กำลังทำ</option><option value="เสร็จสิ้น">🟢 เสร็จสิ้น</option></select>
            <button class="btn-main" onclick="saveEdit()">อัปเดตข้อมูล</button>
            <button onclick="closeEditModal()" style="width:100%; background:none; border:none; margin-top:10px; color:#94a3b8; cursor:pointer;">ปิดหน้าต่าง</button>
        </div>
    </div>

    <div id="loginModal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin-top:0;">🔒 Admin Access</h3>
            <input type="text" id="adminUser" placeholder="User">
            <input type="password" id="adminPass" placeholder="Password">
            <button class="btn-main" onclick="adminLogin()">Unlock</button>
        </div>
    </div>

    <div class="admin-fab" onclick="openLoginModal()">🛠️</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBwNltx2biA-AdM44HjHay-4gO4N1RH_sQ", authDomain: "mytaskapp-pro.firebaseapp.com", 
            projectId: "mytaskapp-pro", storageBucket: "mytaskapp-pro.firebasestorage.app", 
            messagingSenderId: "189296604432", appId: "1:189296604432:web:31dabc3c5e363b2c96a195" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allTasks = [], selectedPhotos = [], editPhotos = [], statusChart, isAdmin = false;
        let editingId = null;
        const monthNames = ["ทั่วไป", "มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

        const getDeviceInfo = () => {
            const ua = navigator.userAgent;
            const h = window.screen.height;
            let d = "Unknown Device";
            if (/android/i.test(ua)) { const m = ua.match(/Android.*;\s([^;]+)\sBuild/); d = m ? `Android (${m[1]})` : "Android"; }
            else if (/iPhone/i.test(ua)) {
                if(h===852) d="iPhone 15/14 Pro"; else if(h===932) d="iPhone 15/14 Pro Max"; else d="iPhone";
            }
            return d + ` [${window.screen.width}x${h}]`;
        };

        // --- Core Functions ---
        window.addTask = async () => {
            const raw = document.getElementById('taskFullInput').value;
            if(!raw) return alert("กรุณากรอกข้อมูล");
            const btn = document.getElementById('saveBtn'); btn.disabled = true;
            const match = raw.match(/^(\d{1,2})\s*[-/]\s*(\d{1,2})\s+(.*)$/);
            const info = getDeviceInfo();
            await addDoc(collection(db, "tasks"), {
                ors: match ? `ORS.${match[1]}/${match[2]}` : "ORS.00/00",
                title: match ? match[3].trim() : raw,
                detail: document.getElementById('taskDetail').value,
                status: document.getElementById('taskStatus').value,
                photos: selectedPhotos, createdAt: new Date().getTime(), createdByDevice: info
            });
            location.reload();
        };

        window.openEditModal = (id) => {
            const t = allTasks.find(x => x.id === id); editingId = id;
            document.getElementById('editFullInput').value = t.ors.replace('ORS.','') + " " + t.title;
            document.getElementById('editDetail').value = t.detail || "";
            document.getElementById('editStatus').value = t.status;
            editPhotos = [...(t.photos || [])];
            renderEditPreview();
            document.getElementById('editModal').classList.add('active');
        };

        window.saveEdit = async () => {
            const raw = document.getElementById('editFullInput').value;
            const match = raw.match(/^(\d{1,2})\s*[-/]\s*(\d{1,2})\s+(.*)$/);
            await updateDoc(doc(db, "tasks", editingId), {
                ors: match ? `ORS.${match[1]}/${match[2]}` : "ORS.00/00",
                title: match ? match[3].trim() : raw,
                detail: document.getElementById('editDetail').value,
                status: document.getElementById('editStatus').value,
                photos: editPhotos,
                lastEditedByDevice: getDeviceInfo()
            });
            closeEditModal();
        };

        // --- Render Helpers ---
        const renderEditPreview = () => {
            document.getElementById('edit-preview-area').innerHTML = editPhotos.map((s, i) => 
                `<div class="preview-item"><img src="${s}"><button class="remove-btn" onclick="removeEditPhoto(${i})">✕</button></div>`).join('');
        };
        window.removeEditPhoto = (i) => { editPhotos.splice(i, 1); renderEditPreview(); };
        
        document.getElementById('editCameraInput').onchange = (e) => {
            for(let f of e.target.files) {
                const r = new FileReader(); r.onload = (ev) => {
                    const img = new Image(); img.src = ev.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const max = 600; let w = img.width, h = img.height;
                        if(w > h) { if(w>max) { h*=max/w; w=max; } } else { if(h>max) { w*=max/h; h=max; } }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0,0,w,h);
                        editPhotos.push(canvas.toDataURL('image/jpeg', 0.6)); renderEditPreview();
                    }
                }; r.readAsDataURL(f);
            }
        };

        // (Other logic remains identical to v1.3 but with improved UI selectors)
        onSnapshot(collection(db, "tasks"), (snap) => {
            allTasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            filterTasks(); updateDashboard();
        });

        window.filterTasks = () => {
            const container = document.getElementById('task-container'); container.innerHTML = "";
            const search = document.getElementById('searchInput').value.toLowerCase();
            const grouped = {};
            allTasks.filter(t => (t.title||"").toLowerCase().includes(search) || (t.ors||"").includes(search)).forEach(t => {
                let m = "ทั่วไป"; try { const idx = parseInt(t.ors.split('/')[0].split('.')[1]); if(idx>0 && idx<=12) m = monthNames[idx]; } catch(e){}
                if(!grouped[m]) grouped[m] = []; grouped[m].push(t);
            });
            monthNames.filter(m => grouped[m]).forEach(mName => {
                let html = `<div class="month-header" onclick="this.nextElementSibling.classList.toggle('active')"><span>📅 ${mName} (${grouped[mName].length})</span><span>▼</span></div><div class="month-content">`;
                grouped[mName].forEach(t => {
                    let color = t.status === "เสร็จสิ้น" ? "var(--status-done)" : (t.status === "กำลังทำ" ? "var(--status-doing)" : "var(--status-wait)");
                    html += `<div class="task-card">
                        <div style="display:flex; justify-content:space-between; font-size:0.8rem;"><b style="color:${color}">${t.ors}</b> <span>${t.status}</span></div>
                        <div style="margin:10px 0; font-weight:600; font-size:1.1rem;">${t.title}</div>
                        ${t.detail ? `<div style="font-size:0.9rem; color:#64748b; margin-bottom:10px;">${t.detail}</div>` : ''}
                        <div class="gallery">${(t.photos||[]).map(p => `<img src="${p}">`).join('')}</div>
                        <div style="display:flex; gap:10px; justify-content:flex-end;">
                            <button onclick="openEditModal('${t.id}')" style="background:#f1f5f9; border:none; padding:8px 15px; border-radius:10px; cursor:pointer;">แก้ไข</button>
                            <button onclick="deleteTask('${t.id}')" style="background:#fff1f2; color:#f43f5e; border:none; padding:8px 15px; border-radius:10px; cursor:pointer;">ลบ</button>
                        </div>
                        ${isAdmin ? `<span class="device-badge">📱 ${t.createdByDevice || 'Unknown'}</span>` : ''}
                    </div>`;
                });
                html += `</div>`; container.innerHTML += html;
            });
        };

        window.showSection = (n) => {
            document.querySelectorAll('.page-section, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('section-'+n).classList.add('active');
            document.getElementById('btn-'+n).classList.add('active');
        };

        window.adminLogin = () => {
            if(document.getElementById('adminUser').value === "Admin" && document.getElementById('adminPass').value === "Admin444") {
                isAdmin = true; document.getElementById('btn-logs').style.display="block";
                document.getElementById('admin-indicator').style.display="block";
                document.getElementById('loginModal').classList.remove('active'); filterTasks();
            }
        };

        // --- UI Modal Toggle ---
        window.openLoginModal = () => document.getElementById('loginModal').classList.add('active');
        window.closeEditModal = () => document.getElementById('editModal').classList.remove('active');
        
        // Auto Resize Add Photos
        document.getElementById('cameraInput').onchange = (e) => {
            for(let f of e.target.files) {
                const r = new FileReader(); r.onload = (ev) => {
                    const img = new Image(); img.src = ev.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const max = 600; let w = img.width, h = img.height;
                        if(w > h) { if(w>max) { h*=max/w; w=max; } } else { if(h>max) { w*=max/h; h=max; } }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0,0,w,h);
                        selectedPhotos.push(canvas.toDataURL('image/jpeg', 0.6));
                        document.getElementById('preview-area').innerHTML = selectedPhotos.map((s, i) => `<div class="preview-item"><img src="${s}"></div>`).join('');
                    }
                }; r.readAsDataURL(f);
            }
        };
    </script>
</body>
</html>
