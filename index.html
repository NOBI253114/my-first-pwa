<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4M TASK - ULTIMATE v1.8.8</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --primary: #10b981; --primary-dark: #059669; --bg: #f8fafc;
            --text-main: #1e293b; --text-sub: #64748b; --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --status-wait: #ef4444;    /* แดง - รอดำเนินการ */
            --status-doing: #f59e0b;   /* ส้ม - กำลังทำ */
            --status-done: #10b981;    /* เขียว - เสร็จสิ้น */
        }
        body { font-family: 'Kanit', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 50px; }
        
        /* Loading Overlay */
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; }
        .progress-container { width: 80%; max-width: 300px; height: 12px; background: #e2e8f0; border-radius: 10px; overflow: hidden; margin-top: 15px; }
        .progress-bar { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s ease; }
        
        /* Header & Nav */
        .app-header { background: #fff; padding: 20px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .app-header h1 { margin: 0; font-size: 1.5rem; color: var(--primary-dark); }
        .nav-tabs { display: flex; padding: 15px; gap: 8px; position: sticky; top: 0; background: var(--bg); z-index: 100; justify-content: center; }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 12px; background: #fff; color: var(--text-sub); cursor: pointer; transition: 0.3s; box-shadow: var(--shadow); font-family: 'Kanit'; font-weight: 500; }
        .tab-btn.active { background: var(--primary); color: #fff; transform: scale(1.05); }

        .container { max-width: 700px; margin: 0 auto; padding: 0 15px; }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Form & Cards */
        .glass-card { background: #fff; border-radius: 20px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 20px; }
        .label-text { font-size: 0.85rem; color: var(--text-sub); margin-bottom: 5px; display: block; font-weight: 500; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #e2e8f0; font-family: 'Kanit'; box-sizing: border-box; font-size: 1rem; outline: none; }
        .btn-main { background: var(--primary); color: #fff; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 600; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }

        /* Task Items */
        .month-header { background: #dcfce7; color: var(--primary-dark); padding: 8px 18px; border-radius: 20px; display: inline-block; margin: 20px 0 10px 0; font-size: 0.9rem; font-weight: 700; }
        .task-card { background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: var(--shadow); }
        .status-badge { padding: 2px 10px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; color: #fff; }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin: 10px 0; }
        .gallery img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; }

        /* Modal & Slider */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; width: 90%; max-width: 500px; border-radius: 20px; padding: 20px; }
    </style>
</head>
<body onclick="initAudio()">

    <div id="loadingOverlay" class="loading-overlay">
        <div id="loadState">
            <div id="percentText" style="font-size: 2.5rem; font-weight: 700; color: var(--primary-dark); text-align:center;">0%</div>
            <div style="color: var(--text-sub); font-size: 0.9rem; margin-top: 5px; text-align:center;">กำลังประมวลผลและบีบอัดข้อมูล...</div>
            <div class="progress-container"><div id="progressBar" class="progress-bar"></div></div>
        </div>
        <div id="successState" style="display:none; text-align: center;">
            <div style="font-size: 80px;">✅</div>
            <h2 style="color: var(--primary-dark);">บันทึกข้อมูลเรียบร้อย!</h2>
        </div>
    </div>

    <div class="app-header">
        <h1>4M TASK</h1>
        <div style="font-size: 0.7rem; color: var(--text-sub);">Version 1.8.8 | Smart Auto-Split | นาย ธิติ พุกวิลัย</div>
    </div>

    <div class="nav-tabs">
        <button id="btn-add" class="tab-btn active" onclick="showSection('add')">➕ เพิ่มงาน</button>
        <button id="btn-view" class="tab-btn" onclick="showSection('view')">📁 คลังงาน</button>
        <button id="btn-dash" class="tab-btn" onclick="showSection('dash')">📊 สรุปผล</button>
    </div>

    <div class="container">
        <div id="section-add" class="page-section active">
            <div class="glass-card">
                <span class="label-text">ข้อมูลงาน (เช่น 01-21 งานทางหลวง...)</span>
                <input type="text" id="taskFullInput" placeholder="เลข-เดือน เว้นวรรค แล้วตามด้วยชื่องาน">
                
                <button onclick="document.getElementById('cameraInput').click()" style="width:100%; padding:10px; border:2px dashed #ccc; border-radius:10px; background:none; margin-bottom:15px; font-family:inherit; cursor:pointer; color: var(--text-sub);">📸 แนบรูปถ่าย</button>
                <input type="file" id="cameraInput" accept="image/*" multiple style="display:none;">
                <div id="preview-area" style="display:flex; gap:8px; overflow-x:auto; margin-bottom:10px;"></div>

                <span class="label-text">รายละเอียดงาน</span>
                <textarea id="taskDetail" rows="3" placeholder="ระบุรายละเอียดเพิ่มเติม..."></textarea>
                
                <span class="label-text">สถานะ</span>
                <select id="taskStatus">
                    <option value="รอดำเนินการ">🔴 รอดำเนินการ</option>
                    <option value="กำลังทำ">🟡 กำลังทำ</option>
                    <option value="เสร็จสิ้น">🟢 เสร็จสิ้น</option>
                </select>
                <button class="btn-main" onclick="addTask()">บันทึกข้อมูลด่วน</button>
            </div>
        </div>

        <div id="section-view" class="page-section">
            <input type="text" id="searchInput" placeholder="ค้นหาชื่องาน หรือ ORS..." onkeyup="filterTasks()" style="margin-bottom:10px;">
            <select id="filterStatus" onchange="filterTasks()" style="margin-bottom:15px;">
                <option value="ทั้งหมด">แสดงทุกสถานะ</option>
                <option value="รอดำเนินการ">รอดำเนินการ</option>
                <option value="กำลังทำ">กำลังทำ</option>
                <option value="เสร็จสิ้น">เสร็จสิ้น</option>
            </select>
            <div id="task-container"></div>
        </div>

        <div id="section-dash" class="page-section">
            <div class="glass-card"><canvas id="statusChart"></canvas></div>
            <button class="btn-main" style="background:#475569;" onclick="exportToCSV()">📤 ส่งออก Excel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBwNltx2biA-AdM44HjHay-4gO4N1RH_sQ",
            authDomain: "mytaskapp-pro.firebaseapp.com",
            projectId: "mytaskapp-pro",
            storageBucket: "mytaskapp-pro.firebasestorage.app",
            messagingSenderId: "189296604432",
            appId: "1:189296604432:web:31dabc3c5e363b2c96a195",
            measurementId: "G-MRE5GH4CYH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allTasks = [];
        let selectedPhotos = [];
        let statusChart;
        const monthNames = ["", "มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

        const sndClick = new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3');
        const sndSuccess = new Audio('https://www.soundjay.com/buttons/sounds/button-09.mp3');
        window.initAudio = () => { sndClick.play().then(()=>sndClick.pause()); };
        const playClick = () => { sndClick.currentTime = 0; sndClick.play(); };

        window.showSection = (name) => {
            playClick();
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('section-' + name).classList.add('active');
            document.getElementById('btn-' + name).classList.add('active');
            if(name === 'dash') updateDashboard();
        };

        async function compressImage(base64Str) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max_size = 600;
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > max_size) { h *= max_size / w; w = max_size; } }
                    else { if (h > max_size) { w *= max_size / h; h = max_size; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.5)); // บีบอัด 50% กัน Error 1MB
                };
            });
        }

        window.addTask = async () => {
            const rawInput = document.getElementById('taskFullInput').value;
            if(!rawInput) return alert("กรุณากรอกข้อมูลงาน");

            playClick();
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.display = 'flex';
            document.getElementById('loadState').style.display = 'block';
            document.getElementById('successState').style.display = 'none';

            // ระบบแยก ORS อัตโนมัติ
            const match = rawInput.match(/^(\d{1,2})\s*[-/]\s*(\d{1,2})\s+(.*)$/);
            let ors, title;
            if (match) {
                ors = `ORS.${match[1]}/${match[2]}`;
                title = match[3].trim();
            } else {
                ors = "ORS.00/00";
                title = rawInput;
            }

            try {
                const compressedPhotos = [];
                for(let photo of selectedPhotos) { 
                    compressedPhotos.push(await compressImage(photo)); 
                }
                
                document.getElementById('progressBar').style.width = '70%';
                document.getElementById('percentText').innerText = '70%';

                await addDoc(collection(db, "tasks"), {
                    ors, title, detail: document.getElementById('taskDetail').value,
                    status: document.getElementById('taskStatus').value, 
                    photos: compressedPhotos, 
                    createdAt: new Date().getTime()
                });
                
                document.getElementById('progressBar').style.width = '100%';
                document.getElementById('percentText').innerText = '100%';
                sndSuccess.play();

                setTimeout(() => {
                    document.getElementById('loadState').style.display = 'none';
                    document.getElementById('successState').style.display = 'block';
                    setTimeout(() => location.reload(), 1500);
                }, 500);
            } catch (e) { 
                overlay.style.display = 'none'; 
                alert("ข้อมูลอาจใหญ่เกินไป ลองลดจำนวนรูปภาพลงครับ"); 
            }
        };

        onSnapshot(query(collection(db, "tasks"), orderBy("ors", "asc")), (snap) => {
            allTasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            filterTasks();
        });

        window.filterTasks = () => {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filterS = document.getElementById('filterStatus').value;
            const container = document.getElementById('task-container');
            container.innerHTML = "";
            let lastMonth = "";

            allTasks.filter(t => {
                const matchSearch = (t.title||"").toLowerCase().includes(search) || (t.ors||"").toLowerCase().includes(search);
                const matchStatus = filterS === 'ทั้งหมด' || t.status === filterS;
                return matchSearch && matchStatus;
            }).forEach(t => {
                const monthNum = parseInt(t.ors.split('.')[1]?.split('/')[0]) || 0;
                const monthName = monthNames[monthNum] || "ไม่ระบุเดือน";
                
                let color = "var(--status-wait)";
                if(t.status === "กำลังทำ") color = "var(--status-doing)";
                if(t.status === "เสร็จสิ้น") color = "var(--status-done)";

                if (lastMonth !== monthName) {
                    lastMonth = monthName;
                    container.innerHTML += `<div class="month-header">📅 เดือน${monthName}</div>`;
                }
                container.innerHTML += `
                    <div class="task-card" style="border-left: 6px solid ${color}">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-weight:700; font-size:0.8rem;">${t.ors}</span>
                            <span class="status-badge" style="background:${color}">${t.status}</span>
                        </div>
                        <div style="font-weight:600; margin:10px 0; font-size:1.1rem; color:${color}">${t.title}</div>
                        <div style="font-size:0.85rem; color:var(--text-sub); margin-bottom:10px;">${t.detail || ''}</div>
                        <div class="gallery">${(t.photos||[]).map(p => `<img src="${p}">`).join('')}</div>
                        <div style="display:flex; justify-content:flex-end; gap:15px; margin-top:10px; padding-top:10px; border-top:1px solid #f1f5f9;">
                            <span style="color:#ef4444; cursor:pointer; font-size:0.8rem;" onclick="deleteTask('${t.id}')">🗑️ ลบงาน</span>
                        </div>
                    </div>`;
            });
        };

        window.deleteTask = async (id) => { if(confirm("ลบงานนี้?")) await deleteDoc(doc(db, "tasks", id)); };

        function updateDashboard() {
            const done = allTasks.filter(t => t.status === 'เสร็จสิ้น').length;
            const doing = allTasks.filter(t => t.status === 'กำลังทำ').length;
            const wait = allTasks.filter(t => t.status === 'รอดำเนินการ').length;
            const ctx = document.getElementById('statusChart').getContext('2d');
            if(statusChart) statusChart.destroy();
            statusChart = new Chart(ctx, { 
                type: 'doughnut', 
                data: { labels: ['เสร็จแล้ว', 'กำลังทำ', 'รอ'], datasets: [{ data: [done, doing, wait], backgroundColor: ['#10b981','#f59e0b','#ef4444'] }] }
            });
        }

        document.getElementById('cameraInput').onchange = (e) => {
            for (let file of e.target.files) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    selectedPhotos.push(ev.target.result);
                    const img = document.createElement('img'); img.src = ev.target.result; img.style = "width:50px; height:50px; object-fit:cover; border-radius:5px;";
                    document.getElementById('preview-area').appendChild(img);
                };
                reader.readAsDataURL(file);
            }
        };

        document.querySelectorAll('button, input, select').forEach(el => el.addEventListener('click', () => {}));
    </script>
</body>
</html>
