<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PREMIUM TASK MANAGER</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.95);
            --primary: #6366f1;
            --accent: #a855f7;
            --bg: #0f172a;
            --text: #1e293b;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            background-attachment: fixed;
            color: white;
            margin: 0;
            padding: 20px;
            padding-bottom: 100px;
        }

        /* Header ดีไซน์ใหม่ */
        .app-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }
        .app-header h1 {
            font-weight: 600;
            letter-spacing: 1px;
            margin: 0;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ฟอร์มบันทึกข้อมูลแบบ Glassmorphism */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 30px;
            color: var(--text);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        input, textarea, select {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            font-family: 'Kanit', sans-serif;
            font-size: 1rem;
            box-sizing: border-box;
            background: #f8fafc;
        }

        .btn-main {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            width: 100%;
            font-weight: 500;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-main:active { transform: scale(0.98); }

        .btn-photo {
            background: #eef2ff;
            color: var(--primary);
            border: 2px dashed var(--primary);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 15px;
            cursor: pointer;
            font-weight: 500;
        }

        /* ระบบแยกกลุ่มเดือน/ปี */
        .month-group { margin-top: 40px; }
        .month-title {
            font-size: 1.4rem;
            font-weight: 500;
            margin-bottom: 15px;
            padding-left: 10px;
            border-left: 4px solid var(--accent);
            color: #e2e8f0;
        }

        /* Card รายการงาน */
        .task-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            color: var(--text);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .badge {
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            color: white;
        }
        .st-รอดำเนินการ { background: #64748b; }
        .st-กำลังทำ { background: #f59e0b; }
        .st-เสร็จสิ้น { background: #10b981; }

        .gallery { display: flex; gap: 10px; overflow-x: auto; margin: 15px 0; padding-bottom: 5px; }
        .gallery img { width: 140px; height: 100px; object-fit: cover; border-radius: 12px; cursor: pointer; }

        .actions { display: flex; gap: 15px; margin-top: 15px; border-top: 1px solid #f1f5f9; padding-top: 15px; }
        .btn-edit { color: var(--primary); cursor: pointer; border: none; background: none; font-family: inherit; font-weight: 500; }
        .btn-delete { color: #ef4444; cursor: pointer; border: none; background: none; font-family: inherit; font-weight: 500; }

        /* Modal & Zoom */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-height: 85vh; border-radius: 24px; padding: 25px; overflow-y: auto; color: var(--text); }
        
        .zoom-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 2000; justify-content: center; align-items: center; }
        .zoom-overlay img { max-width: 100%; max-height: 100%; }

        #preview-area { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 10px; }
        #preview-area img { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="app-header">
        <h1>PREMIUM TASK</h1>
        <p style="opacity: 0.6; font-weight: 200;">Management System v2.0</p>
    </div>

    <div class="glass-card">
        <input type="file" id="cameraInput" accept="image/*" multiple style="display: none;">
        <div class="btn-photo" onclick="document.getElementById('cameraInput').click()">📸 เพิ่มรูปภาพประกอบงาน</div>
        <div id="preview-area"></div>
        <input type="text" id="taskTitle" placeholder="ระบุชื่องานที่ต้องทำ...">
        <textarea id="taskDetail" rows="2" placeholder="รายละเอียดเพิ่มเติม (ถ้ามี)..."></textarea>
        <select id="taskStatus">
            <option value="รอดำเนินการ">รอดำเนินการ</option>
            <option value="กำลังทำ">กำลังทำ</option>
            <option value="เสร็จสิ้น">เสร็จสิ้น</option>
        </select>
        <button class="btn-main" onclick="addTask()">บันทึกข้อมูล</button>
    </div>

    <div id="task-container"></div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top: 0;">แก้ไขข้อมูลงาน</h2>
            <input type="hidden" id="editId">
            <input type="text" id="editTitle">
            <textarea id="editDetail" rows="4"></textarea>
            <select id="editStatus">
                <option value="รอดำเนินการ">รอดำเนินการ</option>
                <option value="กำลังทำ">กำลังทำ</option>
                <option value="เสร็จสิ้น">เสร็จสิ้น</option>
            </select>
            <button class="btn-main" onclick="updateTask()">ยืนยันการแก้ไข</button>
            <button style="background:none; border:none; color: #64748b; width:100%; margin-top:15px; cursor:pointer;" onclick="closeModal()">ยกเลิก</button>
        </div>
    </div>

    <div id="zoomOverlay" class="zoom-overlay" onclick="this.style.display='none'">
        <img id="zoomImg">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 🔥 ใช้ Config ของคุณ
        const firebaseConfig = {
            apiKey: "AIzaSyBwNltx2biA-AdM44HjHay-4gO4N1RH_sQ",
            authDomain: "mytaskapp-pro.firebaseapp.com",
            projectId: "mytaskapp-pro",
            storageBucket: "mytaskapp-pro.firebasestorage.app",
            messagingSenderId: "189296604432",
            appId: "1:189296604432:web:31dabc3c5e363b2c96a195",
            measurementId: "G-MRE5GH4CYH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let selectedPhotos = [];

        // ฟังก์ชันย่อรูปพรีเมียม
        async function resizeImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const maxWidth = 600; 
                        let width = img.width, height = img.height;
                        if (width > maxWidth) { height = (maxWidth / width) * height; width = maxWidth; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.5)); 
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        document.getElementById('cameraInput').onchange = async (e) => {
            const files = Array.from(e.target.files);
            for (let file of files) {
                const base64 = await resizeImage(file);
                selectedPhotos.push(base64);
                const img = document.createElement('img');
                img.src = base64;
                document.getElementById('preview-area').appendChild(img);
            }
        };

        window.addTask = async () => {
            const title = document.getElementById('taskTitle').value;
            const detail = document.getElementById('taskDetail').value;
            const status = document.getElementById('taskStatus').value;
            if (!title) return alert("กรุณาระบุชื่องาน");

            try {
                await addDoc(collection(db, "tasks"), {
                    title, detail, status,
                    photos: selectedPhotos, 
                    createdAt: new Date().getTime()
                });
                // Reset form
                document.getElementById('taskTitle').value = "";
                document.getElementById('taskDetail').value = "";
                document.getElementById('preview-area').innerHTML = "";
                selectedPhotos = [];
            } catch (err) { alert(err.message); }
        };

        // แสดงผลและแยกหมวดหมู่ตามเดือน
        onSnapshot(query(collection(db, "tasks"), orderBy("createdAt", "desc")), (snap) => {
            const container = document.getElementById('task-container');
            container.innerHTML = "";
            let currentMonth = "";

            snap.forEach((docSnap) => {
                const d = docSnap.data();
                const date = new Date(d.createdAt);
                const monthLabel = date.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' });

                // สร้างหัวข้อเดือนถ้าเป็นเดือนใหม่
                if (currentMonth !== monthLabel) {
                    currentMonth = monthLabel;
                    container.innerHTML += `<div class="month-group"><div class="month-title">${currentMonth}</div></div>`;
                }

                const gallery = d.photos ? `<div class="gallery">${d.photos.map(u => `<img src="${u}" onclick="zoomImg('${u}')">`).join('')}</div>` : "";
                
                const cardHtml = `
                    <div class="task-card">
                        <span class="badge st-${d.status}">${d.status}</span>
                        <div style="font-weight:600; font-size:1.2rem; margin-top:10px;">${d.title}</div>
                        <p style="color:#64748b; margin:8px 0;">${d.detail || ''}</p>
                        ${gallery}
                        <div class="actions">
                            <div class="btn-edit" onclick="openEdit('${docSnap.id}', '${d.title}', '${d.detail || ""}', '${d.status}')">แก้ไข</div>
                            <div class="btn-delete" onclick="deleteTask('${docSnap.id}')">ลบรายการ</div>
                        </div>
                    </div>`;
                
                container.lastChild.innerHTML += cardHtml;
            });
        });

        // ฟังก์ชันจัดการ Modal แก้ไข
        window.openEdit = (id, title, detail, status) => {
            document.getElementById('editId').value = id;
            document.getElementById('editTitle').value = title;
            document.getElementById('editDetail').value = detail;
            document.getElementById('editStatus').value = status;
            document.getElementById('editModal').style.display = 'flex';
        };

        window.closeModal = () => document.getElementById('editModal').style.display = 'none';

        window.updateTask = async () => {
            const id = document.getElementById('editId').value;
            const taskRef = doc(db, "tasks", id);
            await updateDoc(taskRef, {
                title: document.getElementById('editTitle').value,
                detail: document.getElementById('editDetail').value,
                status: document.getElementById('editStatus').value
            });
            closeModal();
        };

        window.deleteTask = async (id) => { if(confirm("ต้องการลบงานนี้ใช่หรือไม่?")) await deleteDoc(doc(db, "tasks", id)); };

        window.zoomImg = (url) => {
            document.getElementById('zoomImg').src = url;
            document.getElementById('zoomOverlay').style.display = 'flex';
        };
    </script>
</body>
</html>
