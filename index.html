<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4M TASK - Beta</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #10b981; --primary-dark: #059669; --bg: #f1f5f9;
            --text-main: #1e293b; --text-sub: #64748b; --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --status-wait: #ef4444; --status-doing: #f59e0b; --status-done: #10b981;
        }
        body { font-family: 'Kanit', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 50px; }
        .app-header { background: #fff; padding: 20px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .nav-tabs { display: flex; padding: 15px; gap: 8px; position: sticky; top: 0; background: var(--bg); z-index: 100; justify-content: center; }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 12px; background: #fff; color: var(--text-sub); cursor: pointer; transition: 0.3s; box-shadow: var(--shadow); font-family: 'Kanit'; font-weight: 500; }
        .tab-btn.active { background: var(--primary); color: #fff; transform: translateY(-2px); }
        .container { max-width: 700px; margin: 0 auto; padding: 0 15px; }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; box-shadow: var(--shadow); margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #e2e8f0; font-family: 'Kanit'; box-sizing: border-box; font-size: 1rem; outline: none; }
        .btn-main { background: var(--primary); color: #fff; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.2s; font-family: 'Kanit'; }
        .btn-excel { background: #1d6f42; color: #fff; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 600; cursor: pointer; margin-top: 15px; font-family: 'Kanit'; display: flex; align-items: center; justify-content: center; gap: 10px; }

        .month-header { background: #dcfce7; color: var(--primary-dark); padding: 12px 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin: 15px 0 8px 0; font-size: 1rem; font-weight: 700; cursor: pointer; border: 1px solid #bbf7d0; }
        .month-content.collapsed { display: none; }
        .chevron { transition: transform 0.3s ease; }
        .chevron.rotated { transform: rotate(-90deg); }

        .task-card { background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: var(--shadow); }
        .task-detail-box { background: #f8fafc; border-left: 4px solid #cbd5e1; padding: 10px 12px; margin: 8px 0; border-radius: 0 8px 8px 0; font-size: 0.9rem; color: #475569; white-space: pre-wrap; }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin: 10px 0; }
        .gallery img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; cursor: zoom-in; }
        
        .preview-area { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 15px; padding: 5px 0; }
        .preview-item { position: relative; flex-shrink: 0; }
        .preview-item img { width: 70px; height: 70px; object-fit: cover; border-radius: 10px; border: 2px solid #fff; box-shadow: var(--shadow); }
        .remove-btn { position: absolute; top: -5px; right: -5px; background: #ef4444; color: #fff; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; cursor: pointer; }

        .task-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px; border-top: 1px solid #f1f5f9; padding-top: 10px; }
        .btn-edit { background: #3b82f6; color: #fff; border: none; padding: 6px 15px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-family: 'Kanit'; }
        .btn-del { background: #ef4444; color: #fff; border: none; padding: 6px 15px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-family: 'Kanit'; }
        
        /* Modals & Lightbox */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #fff; padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; position: relative; }

        /* Image Viewer Styles */
        .viewer-container { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .viewer-img { max-width: 95%; max-height: 80vh; object-fit: contain; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .viewer-nav { position: absolute; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; }
        .nav-arrow { background: rgba(255,255,255,0.2); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 24px; cursor: pointer; backdrop-filter: blur(5px); }
        .close-viewer { position: absolute; top: 20px; right: 20px; background: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-weight: bold; cursor: pointer; z-index: 10001; }
    </style>
</head>
<body>

    <div class="app-header">
        <h1>4M TASK</h1>
        <div style="font-size: 0.85rem; color: var(--text-sub); font-weight: 500;">
            Version Beta | พัฒนาโดย ธิติ พุกวิลัย
        </div>
    </div>

    <div class="nav-tabs">
        <button id="btn-add" class="tab-btn active" onclick="showSection('add')">➕ เพิ่มงาน</button>
        <button id="btn-view" class="tab-btn" onclick="showSection('view')">📁 คลังงาน</button>
        <button id="btn-dash" class="tab-btn" onclick="showSection('dash')">📊 สรุปผล</button>
    </div>

    <div class="container">
        <div id="section-add" class="page-section active">
            <div class="glass-card">
                <h3 style="margin-top:0;">บันทึกข้อมูลใหม่</h3>
                <input type="text" id="taskFullInput" placeholder="เลข-เดือน ชื่องาน (เช่น 01-21 งานทางหลวง)">
                <button onclick="document.getElementById('cameraInput').click()" style="width:100%; padding:15px; border:2px dashed var(--primary); border-radius:12px; background:#f0fdf4; color:var(--primary-dark); margin-bottom:10px; cursor:pointer; font-family:'Kanit'; font-weight:600;">📸 กดเพื่อเพิ่มรูปถ่าย</button>
                <input type="file" id="cameraInput" accept="image/*" multiple style="display:none;">
                <div id="preview-area" class="preview-area"></div>
                <textarea id="taskDetail" rows="3" placeholder="รายละเอียดเพิ่มเติม"></textarea>
                <select id="taskStatus">
                    <option value="รอดำเนินการ">🔴 รอดำเนินการ</option>
                    <option value="กำลังทำ">🟡 กำลังทำ</option>
                    <option value="เสร็จสิ้น">🟢 เสร็จสิ้น</option>
                </select>
                <button class="btn-main" id="saveBtn" onclick="addTask()">บันทึกข้อมูล</button>
            </div>
        </div>

        <div id="section-view" class="page-section">
            <input type="text" id="searchInput" placeholder="ค้นหาชื่องานหรือเลข ORS..." onkeyup="filterTasks()" style="width:100%; padding:12px; border-radius:10px; border:1px solid #e2e8f0; margin-bottom:10px;">
            <div id="task-container"></div>
        </div>

        <div id="section-dash" class="page-section">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
                <div class="glass-card" style="text-align:center; padding:15px; margin-bottom:0;">
                    <div id="stat-total" style="font-size:1.5rem; font-weight:700;">0</div><div>งานทั้งหมด</div>
                </div>
                <div class="glass-card" style="text-align:center; padding:15px; margin-bottom:0;">
                    <div id="stat-done" style="font-size:1.5rem; font-weight:700; color:var(--primary)">0</div><div>เสร็จสิ้น</div>
                </div>
            </div>
            <div class="glass-card"><canvas id="statusChart"></canvas></div>
            <button class="btn-excel" onclick="exportToExcel()">📗 ส่งออกเป็น Excel (.xlsx)</button>
        </div>
    </div>

    <div id="editModal" class="modal-overlay"><div class="modal-content">
        <h3>📝 แก้ไขข้อมูล</h3>
        <input type="text" id="editFullInput">
        <textarea id="editDetail" rows="3"></textarea>
        <select id="editStatus"><option value="รอดำเนินการ">🔴 รอดำเนินการ</option><option value="กำลังทำ">🟡 กำลังทำ</option><option value="เสร็จสิ้น">🟢 เสร็จสิ้น</option></select>
        <button class="btn-main" onclick="saveEdit()">อัปเดตข้อมูล</button>
        <button onclick="closeEditModal()" style="width:100%; background:none; border:none; margin-top:10px; cursor:pointer; color:var(--text-sub);">ยกเลิก</button>
    </div></div>

    <div id="imageViewer" class="modal-overlay" style="background: rgba(0,0,0,0.95);">
        <button class="close-viewer" onclick="closeViewer()">✕</button>
        <div class="viewer-container">
            <img id="viewerImg" class="viewer-img" src="">
            <div class="viewer-nav">
                <button class="nav-arrow" onclick="changeImage(-1)">❮</button>
                <button class="nav-arrow" onclick="changeImage(1)">❯</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBwNltx2biA-AdM44HjHay-4gO4N1RH_sQ", authDomain: "mytaskapp-pro.firebaseapp.com", 
            projectId: "mytaskapp-pro", storageBucket: "mytaskapp-pro.firebasestorage.app", 
            messagingSenderId: "189296604432", appId: "1:189296604432:web:31dabc3c5e363b2c96a195" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allTasks = [], selectedPhotos = [], statusChart, editingId = null;
        let currentViewerPhotos = [], currentViewerIdx = 0;
        const monthNames = ["ทั่วไป", "มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

        // --- ระบบรูปภาพ ---
        document.getElementById('cameraInput').onchange = (e) => {
            const files = e.target.files;
            for (let file of files) {
                const reader = new FileReader();
                reader.onload = (ev) => { selectedPhotos.push(ev.target.result); renderPreview(); };
                reader.readAsDataURL(file);
            }
        };

        function renderPreview() {
            const area = document.getElementById('preview-area');
            area.innerHTML = selectedPhotos.map((src, i) => `
                <div class="preview-item">
                    <img src="${src}">
                    <button class="remove-btn" onclick="removePhoto(${i})">✕</button>
                </div>
            `).join('');
        }
        window.removePhoto = (i) => { selectedPhotos.splice(i, 1); renderPreview(); };

        async function compressImg(base64) {
            return new Promise(res => {
                const img = new Image(); img.src = base64;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = 600; let w = img.width, h = img.height;
                    if (w > h) { if(w > max) { h *= max/w; w = max; } } else { if(h > max) { w *= max/h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    res(canvas.toDataURL('image/jpeg', 0.6));
                };
            });
        }

        // --- Image Viewer Logic ---
        window.openViewer = (photos, idx) => {
            currentViewerPhotos = photos;
            currentViewerIdx = idx;
            document.getElementById('viewerImg').src = photos[idx];
            document.getElementById('imageViewer').classList.add('active');
        };
        window.closeViewer = () => document.getElementById('imageViewer').classList.remove('active');
        window.changeImage = (step) => {
            currentViewerIdx += step;
            if(currentViewerIdx < 0) currentViewerIdx = currentViewerPhotos.length - 1;
            if(currentViewerIdx >= currentViewerPhotos.length) currentViewerIdx = 0;
            document.getElementById('viewerImg').src = currentViewerPhotos[currentViewerIdx];
        };

        // --- CRUD ---
        window.addTask = async () => {
            const raw = document.getElementById('taskFullInput').value;
            if(!raw) return alert("กรุณากรอกชื่องาน");
            const btn = document.getElementById('saveBtn');
            btn.innerText = "กำลังบันทึก..."; btn.disabled = true;
            try {
                const match = raw.match(/^(\d{1,2})\s*[-/]\s*(\d{1,2})\s+(.*)$/);
                const ors = match ? `ORS.${match[1]}/${match[2]}` : "ORS.00/00";
                const title = match ? match[3].trim() : raw;
                const compressed = [];
                for(let pic of selectedPhotos) compressed.push(await compressImg(pic));
                await addDoc(collection(db, "tasks"), {
                    ors, title, detail: document.getElementById('taskDetail').value,
                    status: document.getElementById('taskStatus').value,
                    photos: compressed, createdAt: new Date().getTime()
                });
                document.getElementById('taskFullInput').value = "";
                document.getElementById('taskDetail').value = "";
                selectedPhotos = []; renderPreview();
                showSection('view');
            } catch (e) { alert("Error: " + e.message); }
            btn.innerText = "บันทึกข้อมูล"; btn.disabled = false;
        };

        onSnapshot(collection(db, "tasks"), (snap) => {
            allTasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            allTasks.sort((a, b) => (a.ors || "").localeCompare(b.ors || ""));
            filterTasks();
            updateDashboard();
        });

        window.showSection = (name) => {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('section-' + name).classList.add('active');
            document.getElementById('btn-' + name).classList.add('active');
            if(name === 'dash') updateDashboard();
        };

        window.toggleMonth = (m) => {
            document.getElementById(`content-${m}`).classList.toggle('collapsed');
            document.getElementById(`icon-${m}`).classList.toggle('rotated');
        };

        window.filterTasks = () => {
            const container = document.getElementById('task-container'); container.innerHTML = "";
            const search = document.getElementById('searchInput').value.toLowerCase();
            const grouped = {};
            allTasks.filter(t => (t.title||"").toLowerCase().includes(search) || (t.ors||"").includes(search)).forEach(t => {
                let m = "ทั่วไป"; try { const idx = parseInt(t.ors.split('/')[0].split('.')[1]); if(idx>0 && idx<=12) m = monthNames[idx]; } catch(e){}
                if(!grouped[m]) grouped[m] = []; grouped[m].push(t);
            });
            monthNames.filter(m => grouped[m]).forEach(mName => {
                const sId = mName.replace(/\s+/g, '');
                let html = `<div class="month-header" onclick="toggleMonth('${sId}')"><span>📅 เดือน${mName} (${grouped[mName].length})</span><span id="icon-${sId}" class="chevron rotated">▼</span></div><div id="content-${sId}" class="month-content collapsed">`;
                grouped[mName].forEach(t => {
                    let c = t.status === "เสร็จสิ้น" ? "var(--status-done)" : (t.status === "กำลังทำ" ? "var(--status-doing)" : "var(--status-wait)");
                    const photoArgs = JSON.stringify(t.photos || []).replace(/"/g, '&quot;');
                    html += `<div class="task-card" style="border-left: 6px solid ${c}">
                        <div style="display:flex; justify-content:space-between;"><b>${t.ors}</b> <span style="color:${c}">${t.status}</span></div>
                        <div style="margin:8px 0; font-weight:600;">${t.title}</div>
                        ${t.detail ? `<div class="task-detail-box">${t.detail}</div>` : ''}
                        <div class="gallery">${(t.photos||[]).map((p, i) => `<img src="${p}" onclick='openViewer(${photoArgs}, ${i})'>`).join('')}</div>
                        <div class="task-actions">
                            <button class="btn-edit" onclick="openEditModal('${t.id}')">แก้ไข</button>
                            <button class="btn-del" onclick="deleteTask('${t.id}')">ลบ</button>
                        </div>
                    </div>`;
                });
                html += `</div>`; container.innerHTML += html;
            });
        };

        window.deleteTask = async (id) => { if(confirm("ลบงานนี้?")) await deleteDoc(doc(db, "tasks", id)); };
        window.openEditModal = (id) => { 
            const t = allTasks.find(x => x.id === id); editingId = id;
            document.getElementById('editFullInput').value = t.ors.replace('ORS.','') + " " + t.title;
            document.getElementById('editDetail').value = t.detail || "";
            document.getElementById('editStatus').value = t.status;
            document.getElementById('editModal').classList.add('active');
        };
        window.closeEditModal = () => document.getElementById('editModal').classList.remove('active');
        window.saveEdit = async () => {
            const raw = document.getElementById('editFullInput').value;
            const match = raw.match(/^(\d{1,2})\s*[-/]\s*(\d{1,2})\s+(.*)$/);
            await updateDoc(doc(db, "tasks", editingId), {
                ors: match ? `ORS.${match[1]}/${match[2]}` : "ORS.00/00",
                title: match ? match[3].trim() : raw,
                detail: document.getElementById('editDetail').value,
                status: document.getElementById('editStatus').value
            });
            closeEditModal();
        };

        window.updateDashboard = () => {
            const counts = { 'เสร็จสิ้น': 0, 'กำลังทำ': 0, 'รอดำเนินการ': 0 };
            allTasks.forEach(t => counts[t.status]++);
            document.getElementById('stat-total').innerText = allTasks.length;
            document.getElementById('stat-done').innerText = counts['เสร็จสิ้น'];
            const ctx = document.getElementById('statusChart')?.getContext('2d');
            if(!ctx) return;
            if(statusChart) statusChart.destroy();
            statusChart = new Chart(ctx, {
                type: 'doughnut', data: { labels: Object.keys(counts), datasets: [{ data: Object.values(counts), backgroundColor: ['#10b981', '#f59e0b', '#ef4444'] }] }
            });
        };

        // --- ระบบส่งออก Excel ---
        window.exportToExcel = () => {
            if(allTasks.length === 0) return alert("ไม่มีข้อมูลให้ส่งออก");
            const exportData = allTasks.map(t => ({
                "วันที่บันทึก": new Date(t.createdAt).toLocaleDateString('th-TH'),
                "ORS": t.ors,
                "ชื่องาน": t.title,
                "รายละเอียด": t.detail || "-",
                "สถานะ": t.status
            }));
            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "4M_Task_Summary");
            XLSX.writeFile(wb, `4M_Task_Report_${new Date().toISOString().split('T')[0]}.xlsx`);
        };
    </script>
</body>
</html>
