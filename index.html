<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4M TASK - Beta 1.5 Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #6366f1; --primary-light: #818cf8; --secondary: #10b981;
            --dark: #1e293b; --text-main: #0f172a; --text-sub: #64748b;
            --glass: rgba(255, 255, 255, 0.85); --glass-dark: rgba(15, 23, 42, 0.8);
            --shadow: 0 20px 25px -5px rgba(0,0,0,0.05), 0 10px 10px -5px rgba(0,0,0,0.01);
            --shadow-lg: 0 25px 50px -12px rgba(0,0,0,0.1);
            --status-wait: #f43f5e; --status-doing: #fbbf24; --status-done: #10b981;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Kanit', sans-serif; margin: 0; background: #f1f5f9;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            min-height: 100vh; color: var(--text-main); padding-bottom: 80px;
        }

        /* ----------------------------- Background Decor ----------------------------- */
        body::before {
            content: ""; position: fixed; top: -10%; left: -15%; width: 50%; height: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            z-index: -1; filter: blur(60px); animation: drift 15s infinite alternate ease-in-out;
        }
        @keyframes drift { from { transform: translate(0, 0); } to { transform: translate(5%, 5%); } }

        /* --------------------------------- Header --------------------------------- */
        .app-header { 
            padding: 30px 20px 20px 20px; text-align: center; background: rgba(255,255,255,0.4);
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.01), 0 2px 4px -1px rgba(0,0,0,0.005);
        }
        .app-header h1 { margin: 0; font-weight: 700; color: var(--primary); font-size: 1.8rem; letter-spacing: 1px; }
        .version-tag { font-size: 0.7rem; background: var(--primary); color: #fff; padding: 2px 10px; border-radius: 20px; display: inline-block; margin-top: 5px; }

        /* -------------------------------- Navigation -------------------------------- */
        .nav-tabs { 
            display: flex; justify-content: center; gap: 8px; padding: 15px; 
            position: sticky; top: 0; z-index: 100; background: rgba(241, 245, 249, 0.7); backdrop-filter: blur(15px);
        }
        .tab-btn { 
            padding: 12px 16px; border: none; border-radius: 16px; background: var(--glass);
            color: var(--text-sub); font-family: 'Kanit'; font-weight: 500; cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.6);
        }
        .tab-btn:hover { background: #fff; color: var(--primary); }
        .tab-btn.active { background: var(--primary); color: #fff; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }

        .container { max-width: 650px; margin: 0 auto; padding: 0 15px; }
        
        /* ------------------------------ General Cards ------------------------------ */
        .glass-card { 
            background: var(--glass); backdrop-filter: blur(20px); border-radius: 28px;
            padding: 25px; border: 1px solid rgba(255,255,255,0.7); box-shadow: var(--shadow); 
            margin-bottom: 25px; animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(25px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* ------------------------------- Task Cards ------------------------------- */
        .month-header { 
            background: rgba(99, 102, 241, 0.1); color: var(--primary); padding: 16px 20px; 
            border-radius: 18px; display: flex; justify-content: space-between; align-items: center; 
            margin: 25px 0 12px 0; font-weight: 600; cursor: pointer; border: 1px solid rgba(99, 102, 241, 0.1);
            transition: 0.3s;
        }
        .month-header:hover { background: rgba(99, 102, 241, 0.15); }
        .month-header .chevron { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); }
        .month-header.active .chevron { transform: rotate(180deg); }

        .month-content { max-height: 0; overflow: hidden; transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .month-content.open { max-height: 5000px; /* arbitrary large value */ }

        .task-card { 
            background: #fff; border-radius: 24px; padding: 22px; margin-bottom: 20px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.03); border: 1px solid transparent; transition: 0.3s;
        }
        .task-card:hover { transform: translateY(-3px); border-color: rgba(99, 102, 241, 0.1); box-shadow: var(--shadow); }
        
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 18px 0; }
        .gallery img { 
            width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 14px; 
            cursor: pointer; transition: 0.3s; border: 2px solid transparent;
        }
        .gallery img:hover { transform: scale(1.05); border-color: #fff; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }

        /* ------------------------------- Premium Image Viewer (Lightbox) ------------------------------- */
        .viewer-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 10000; backdrop-filter: blur(10px);
            align-items: center; justify-content: center; animation: fadeIn 0.3s ease;
        }
        .viewer-overlay.active { display: flex; }
        .viewer-img { max-width: 92%; max-height: 85%; border-radius: 12px; box-shadow: var(--shadow-lg); transition: transform 0.3s ease; }
        .viewer-close { position: absolute; top: 25px; right: 25px; color: #fff; font-size: 30px; cursor: pointer; opacity: 0.7; transition: 0.2s; }
        .viewer-close:hover { opacity: 1; }
        .viewer-nav { position: absolute; top: 50%; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; transform: translateY(-50%); }
        .viewer-nav-btn { background: rgba(255,255,255,0.1); color: #fff; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 1.5rem; cursor: pointer; transition: 0.2s; -webkit-backdrop-filter: blur(5px); backdrop-filter: blur(5px); }
        .viewer-nav-btn:hover { background: rgba(255,255,255,0.2); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* General UI Elements */
        input, textarea, select { 
            width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 14px;
            border: 1px solid #e2e8f0; background: rgba(255,255,255,0.8);
            font-family: 'Kanit'; font-size: 1rem; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
        
        .btn-main { 
            background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%);
            color: #fff; border: none; padding: 16px; border-radius: 18px; width: 100%;
            font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 1.1rem;
        }
        .btn-main:active { transform: scale(0.98); }

        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15,23,42,0.8); z-index: 9999; justify-content: center; align-items: center; 
            backdrop-filter: blur(8px); animation: fadeIn 0.2s;
        }
        .modal-overlay.active { display: flex; }
        .modal-content { 
            background: #fff; padding: 35px; border-radius: 30px; width: 92%; max-width: 450px; 
            box-shadow: var(--shadow-lg); animation: popUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes popUp { from { transform: scale(0.85) translateY(30px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

        .admin-fab { 
            position: fixed; bottom: 25px; right: 25px; width: 55px; height: 55px;
            background: var(--dark); color: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); cursor: pointer; z-index: 500; font-size: 22px;
        }
    </style>
</head>
<body>

    <div id="imageViewer" class="viewer-overlay">
        <span class="viewer-close" onclick="closeImageViewer()">✕</span>
        <div class="viewer-nav">
            <button class="viewer-nav-btn" onclick="navViewer(-1)">❮</button>
            <button class="viewer-nav-btn" onclick="navViewer(1)">❯</button>
        </div>
        <img id="viewerImg" src="" class="viewer-img" onclick="closeImageViewer()">
    </div>

    <div class="app-header">
        <h1>4M TASK</h1>
        <div class="version-tag">Beta 1.5 Premium</div>
        <div id="admin-indicator" style="display:none; color: var(--secondary); font-size: 0.8rem; font-weight: bold; margin-top:5px;">🛡️ ADMIN MODE</div>
    </div>

    <div class="nav-tabs">
        <button id="nav-add" class="tab-btn active" onclick="showSection('add')">✨ เพิ่มงาน</button>
        <button id="nav-view" class="tab-btn" onclick="showSection('view')">📂 คลังงาน</button>
        <button id="nav-dash" class="tab-btn" onclick="showSection('dash')">📊 สถิติ</button>
        <button id="nav-logs" class="tab-btn" onclick="showSection('logs')" style="display:none;">📜 ล็อก</button>
    </div>

    <div class="container">
        <div id="section-add" class="page-section active">
            <div class="glass-card">
                <h3 style="margin-top:0;">🚀 สร้างงานใหม่</h3>
                <input type="text" id="taskFullInput" placeholder="เลข-เดือน ชื่องาน (เช่น 05-21 ติดตั้งระบบ)">
                <button onclick="document.getElementById('cameraInput').click()" class="btn-main" style="background:#fff; color:var(--primary); border:2px dashed var(--primary); margin-bottom:15px; font-weight:500;">📸 เพิ่มรูปถ่ายงาน</button>
                <input type="file" id="cameraInput" accept="image/*" multiple style="display:none;">
                <div id="preview-area" style="display:flex; gap:10px; overflow-x:auto;"></div>
                <textarea id="taskDetail" rows="4" placeholder="ระบุรายละเอียดงาน..."></textarea>
                <select id="taskStatus">
                    <option value="รอดำเนินการ">🔴 รอดำเนินการ</option>
                    <option value="กำลังทำ">🟡 กำลังทำ</option>
                    <option value="เสร็จสิ้น">🟢 เสร็จสิ้น</option>
                </select>
                <button class="btn-main" id="saveBtn" onclick="addTask()">ยืนยันบันทึกงาน</button>
            </div>
        </div>

        <div id="section-view" class="page-section">
            <input type="text" id="searchInput" placeholder="🔍 ค้นหาเลข ORS หรือ ชื่องาน..." onkeyup="filterTasks()">
            <div id="task-container"></div>
        </div>

        <div id="section-dash" class="page-section">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:20px;">
                <div class="glass-card" style="text-align:center; padding:20px; margin-bottom:0;"><div id="stat-total" style="font-size:2rem; font-weight:700;">0</div><div style="color:var(--text-sub)">รวม</div></div>
                <div class="glass-card" style="text-align:center; padding:20px; margin-bottom:0;"><div id="stat-done" style="font-size:2rem; font-weight:700; color:var(--secondary)">0</div><div style="color:var(--text-sub)">สำเร็จ</div></div>
            </div>
            <div class="glass-card" style="padding:40px;"><canvas id="statusChart"></canvas></div>
            <button class="btn-main" style="background:var(--secondary)" onclick="exportToExcel()">📗 ส่งออก Excel</button>
        </div>

        <div id="section-logs" class="page-section">
            <div id="log-container"></div>
        </div>
    </div>

    <div id="editModal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin-top:0;">📝 แก้ไขงาน</h3>
            <input type="text" id="editFullInput">
            <textarea id="editDetail" rows="4"></textarea>
            
            <div style="background:#f1f5f9; padding:12px; border-radius:14px; margin-bottom:15px;">
                <div id="edit-preview-area" style="display:flex; gap:8px; overflow-x:auto; margin-bottom:10px;"></div>
                <button onclick="document.getElementById('editCameraInput').click()" style="width:100%; padding:8px; border-radius:10px; border:1px solid #ddd; background:#fff; cursor:pointer;">➕ เพิ่มรูปใหม่</button>
                <input type="file" id="editCameraInput" accept="image/*" multiple style="display:none;">
            </div>

            <select id="editStatus"><option value="รอดำเนินการ">🔴 รอดำเนินการ</option><option value="กำลังทำ">🟡 กำลังทำ</option><option value="เสร็จสิ้น">🟢 เสร็จสิ้น</option></select>
            <div style="display:flex; gap:10px;">
                <button class="btn-main" onclick="saveEdit()">อัปเดตข้อมูล</button>
                <button onclick="closeEditModal()" style="flex:1; background:#f1f5f9; border:none; border-radius:18px; cursor:pointer;">ปิด</button>
            </div>
        </div>
    </div>

    <div id="loginModal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin-top:0;">🔐 Admin Login</h3>
            <input type="text" id="adminUser" placeholder="User">
            <input type="password" id="adminPass" placeholder="Password">
            <button class="btn-main" onclick="adminLogin()">Unlock</button>
            <button onclick="closeLoginModal()" style="width:100%; background:none; border:none; margin-top:10px; color:#94a3b8; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <div id="deleteModal" class="modal-overlay">
        <div class="modal-content" style="text-align: center;">
            <div style="font-size: 3rem;">⚠️</div>
            <h3 style="color: #ef4444; margin-top: 0;">ยืนยันการลบ?</h3>
            <div style="display: flex; gap: 10px;">
                <button onclick="closeDeleteModal()" style="flex:1; padding:12px; border-radius:12px; border:1px solid #ddd; background:#fff; font-family:'Kanit';">ยกเลิก</button>
                <button id="btn-confirm-delete" onclick="confirmDeleteTask()" style="flex:1; padding:12px; border-radius:12px; border:none; background:#ef4444; color:#fff; font-weight:600; font-family:'Kanit';">ลบข้อมูล</button>
            </div>
        </div>
    </div>

    <div class="admin-fab" onclick="openLoginModal()">🛡️</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBwNltx2biA-AdM44HjHay-4gO4N1RH_sQ", authDomain: "mytaskapp-pro.firebaseapp.com", 
            projectId: "mytaskapp-pro", storageBucket: "mytaskapp-pro.firebasestorage.app", 
            messagingSenderId: "189296604432", appId: "1:189296604432:web:31dabc3c5e363b2c96a195" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allTasks = [], selectedPhotos = [], editPhotos = [], statusChart, isAdmin = false;
        let editingId = null, taskToDeleteId = null;
        
        // Viewer state
        let currentPhotosArray = [];
        let currentPhotoIndex = 0;

        const monthNames = ["ทั่วไป", "มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

        // 📱 Device Forensic
        const getDeviceInfo = () => {
            const ua = navigator.userAgent; const h = window.screen.height; let d = "Device Unknown";
            if (/android/i.test(ua)) { const m = ua.match(/Android.*;\s([^;]+)\sBuild/); d = m ? `Android (${m[1]})` : "Android"; }
            else if (/iPhone/i.test(ua)) { if(h===852) d="iPhone 15/14 Pro"; else if(h===932) d="iPhone 15/14 Pro Max"; else d="iPhone"; }
            return d + ` [${window.screen.width}x${h}]`;
        };

        // --- Premium Image Viewer ---
        window.openImageViewer = (photos, index) => {
            currentPhotosArray = photos;
            currentPhotoIndex = index;
            const viewer = document.getElementById('imageViewer');
            const viewerImg = document.getElementById('viewerImg');
            viewerImg.src = currentPhotosArray[currentPhotoIndex];
            viewer.classList.add('active');
            
            // ป้องกันการ Scroll พื้นหลัง
            document.body.style.overflow = 'hidden';
        };

        window.closeImageViewer = () => {
            document.getElementById('imageViewer').classList.remove('active');
            document.body.style.overflow = ''; // คืนค่า Scroll
        };

        window.navViewer = (step) => {
            currentPhotoIndex += step;
            if (currentPhotoIndex < 0) currentPhotoIndex = currentPhotosArray.length - 1;
            if (currentPhotoIndex >= currentPhotosArray.length) currentPhotoIndex = 0;
            document.getElementById('viewerImg').src = currentPhotosArray[currentPhotoIndex];
        };

        // รองรับการใช้ปุ่มคีย์บอร์ดซ้าย-ขวา เลื่อนรูป
        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('imageViewer').classList.contains('active')) return;
            if (e.key === 'ArrowLeft') navViewer(-1);
            else if (e.key === 'ArrowRight') navViewer(1);
            else if (e.key === 'Escape') closeImageViewer();
        });

        // --- Core Functions ---
        window.addTask = async () => {
            const raw = document.getElementById('taskFullInput').value;
            if(!raw) return alert("กรุณาระบุชื่องาน");
            const btn = document.getElementById('saveBtn'); btn.disabled = true; btn.innerText="กำลังบันทึก...";
            try {
                const match = raw.match(/^(\d{1,2})\s*[-/]\s*(\d{1,2})\s+(.*)$/);
                const ors = match ? `ORS.${match[1]}/${match[2]}` : "ORS.00/00";
                const title = match ? match[3].trim() : raw;
                await addDoc(collection(db, "tasks"), {
                    ors, title, detail: document.getElementById('taskDetail').value,
                    status: document.getElementById('taskStatus').value,
                    photos: selectedPhotos, createdAt: new Date().getTime(), createdByDevice: getDeviceInfo()
                });
                location.reload();
            } catch (e) { alert(e.message); btn.disabled = false; btn.innerText="ยืนยันบันทึกงาน"; }
        };

        window.openEditModal = (id) => {
            const t = allTasks.find(x => x.id === id); editingId = id;
            document.getElementById('editFullInput').value = t.ors.replace('ORS.','') + " " + t.title;
            document.getElementById('editDetail').value = t.detail || "";
            document.getElementById('editStatus').value = t.status;
            editPhotos = [...(t.photos || [])];
            renderEditPreview();
            document.getElementById('editModal').classList.add('active');
        };

        window.saveEdit = async () => {
            const raw = document.getElementById('editFullInput').value;
            const match = raw.match(/^(\d{1,2})\s*[-/]\s*(\d{1,2})\s+(.*)$/);
            await updateDoc(doc(db, "tasks", editingId), {
                ors: match ? `ORS.${match[1]}/${match[2]}` : "ORS.00/00",
                title: match ? match[3].trim() : raw,
                detail: document.getElementById('editDetail').value,
                status: document.getElementById('editStatus').value,
                photos: editPhotos, lastEditedByDevice: getDeviceInfo()
            });
            closeEditModal();
        };

        window.openDeleteModal = (id) => { taskToDeleteId = id; document.getElementById('deleteModal').classList.add('active'); };
        window.closeDeleteModal = () => document.getElementById('deleteModal').classList.remove('active');
        window.confirmDeleteTask = async () => { await deleteDoc(doc(db, "tasks", taskToDeleteId)); closeDeleteModal(); };

        // --- Render Helpers ---
        window.filterTasks = () => {
            const container = document.getElementById('task-container'); container.innerHTML = "";
            const search = document.getElementById('searchInput').value.toLowerCase();
            const grouped = {};
            allTasks.filter(t => (t.title||"").toLowerCase().includes(search) || (t.ors||"").includes(search)).forEach(t => {
                let m = "ทั่วไป"; try { const idx = parseInt(t.ors.split('/')[0].split('.')[1]); if(idx>0 && idx<=12) m = monthNames[idx]; } catch(e){}
                if(!grouped[m]) grouped[m] = []; grouped[m].push(t);
            });
            monthNames.filter(m => grouped[m]).forEach(mName => {
                const sId = 'm-' + mName.replace(/\s+/g, '');
                
                // หัวข้อเดือน (set เป็น collapsed ในตัว style)
                let html = `<div class="month-header" onclick="toggleMonth('${sId}', this)">
                                <span>📅 เดือน${mName} (${grouped[mName].length})</span>
                                <span class="chevron">▼</span>
                            </div>
                            <div id="${sId}" class="month-content">`;

                grouped[mName].forEach(t => {
                    let color = t.status === "เสร็จสิ้น" ? "var(--status-done)" : (t.status === "กำลังทำ" ? "var(--status-doing)" : "var(--status-wait)");
                    
                    // แปลง array รูปภาพงานนั้นๆ ให้เป็น JSON string เพื่อส่งเข้าไปใน onclick
                    const photosJSON = JSON.stringify(t.photos || []).replace(/"/g, '&quot;');

                    html += `<div class="task-card" style="border-left: 6px solid ${color}">
                        <div style="display:flex; justify-content:space-between; font-size:0.8rem;"><b style="color:${color}">${t.ors}</b> <span>${t.status}</span></div>
                        <div style="margin:10px 0; font-weight:600; font-size:1.1rem;">${t.title}</div>
                        ${t.detail ? `<div style="font-size:0.9rem; color:#64748b; margin-bottom:12px; white-space:pre-wrap;">${t.detail}</div>` : ''}
                        
                        <div class="gallery">${(t.photos||[]).map((p, index) => `<img src="${p}" onclick="openImageViewer(${photosJSON}, ${index})">`).join('')}</div>
                        
                        <div style="display:flex; gap:10px; justify-content:flex-end;">
                            <button onclick="openEditModal('${t.id}')" style="background:#f1f5f9; border:none; padding:8px 15px; border-radius:10px; cursor:pointer; font-family:'Kanit';">แก้ไข</button>
                            <button onclick="openDeleteModal('${t.id}')" style="background:#fff1f2; color:#f43f5e; border:none; padding:8px 15px; border-radius:10px; cursor:pointer; font-family:'Kanit';">ลบ</button>
                        </div>
                        ${isAdmin ? `<div style="font-size:0.75rem; color:#94a3b8; margin-top:10px; padding-top:10px; border-top:1px dashed #e2e8f0;">➕ สร้าง: ${t.createdByDevice || '-'}<br>🛠️ ล่าสุด: ${t.lastEditedByDevice || '-'}</div>` : ''}
                    </div>`;
                });
                html += `</div>`; container.innerHTML += html;
            });
        };

        // --- Logic สำหรับยุบ-ขยายเดือน ---
        window.toggleMonth = (mId, headerEl) => {
            const content = document.getElementById(mId);
            headerEl.classList.toggle('active');
            content.classList.toggle('open');
        };

        // ... (ส่วน Logic อื่นๆ เช่น Login, Preview รูป เหมือนเดิม) ...
        const renderEditPreview = () => {
            document.getElementById('edit-preview-area').innerHTML = editPhotos.map((s, i) => 
                `<div style="position:relative; flex-shrink:0;"><img src="${s}" style="width:80px; height:80px; object-fit:cover; border-radius:10px;"><button onclick="removeEditPhoto(${i})" style="position:absolute; top:-5px; right:-5px; background:#f43f5e; color:#fff; border:none; border-radius:50%; width:20px; height:20px; cursor:pointer; font-size:10px;">✕</button></div>`).join('');
        };
        window.removeEditPhoto = (i) => { editPhotos.splice(i, 1); renderEditPreview(); };
        
        // --- ส่วนที่เหลือเหมือนเดิม ---
        onSnapshot(collection(db, "tasks"), (snap) => { allTasks = snap.docs.map(d => ({ id: d.id, ...d.data() })); allTasks.sort((a,b)=>a.ors.localeCompare(b.ors)); filterTasks(); updateDashboard(); });
        window.showSection = (n) => { document.querySelectorAll('.page-section, .tab-btn').forEach(el => el.classList.remove('active')); document.getElementById('section-'+n).classList.add('active'); document.getElementById('nav-'+n).classList.add('active'); };
        window.closeEditModal = () => document.getElementById('editModal').classList.remove('active');
        window.openLoginModal = () => document.getElementById('loginModal').classList.add('active');
        window.closeLoginModal = () => document.getElementById('loginModal').classList.remove('active');
        window.adminLogin = () => { if(document.getElementById('adminUser').value === "Admin" && document.getElementById('adminPass').value === "Admin444") { isAdmin = true; document.getElementById('nav-logs').style.display="block"; document.getElementById('admin-indicator').style.display="block"; closeLoginModal(); filterTasks(); } else alert("Error"); };
        
        // Image Processing เหมือนเดิม (Resize)
        const processFiles = (files, target, previewId) => {
            for(let f of files) { const r = new FileReader(); r.onload = (ev) => { const img = new Image(); img.src = ev.target.result; img.onload = () => { const cv = document.createElement('canvas'); const mx=600; let w=img.width, h=img.height; if(w>h){ if(w>mx){ h*=mx/w; w=mx; } }else{ if(h>mx){ w*=mx/h; h=mx; } } cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img, 0,0,w,h); target.push(cv.toDataURL('image/jpeg', 0.6)); renderPrevs(target, previewId); } }; r.readAsDataURL(f); }
        };
        const renderPrevs = (arr, id) => { document.getElementById(id).innerHTML = arr.map((s,i)=>`<div style="position:relative; flex-shrink:0;"><img src="${s}" style="width:70px; height:70px; object-fit:cover; border-radius:10px;"><button onclick="remPhoto(${i}, '${id}')" style="position:absolute; top:-5px; right:-5px; background:#f43f5e; color:#fff; border:none; border-radius:50%; width:20px; height:20px; cursor:pointer; font-size:10px;">✕</button></div>`).join(''); };
        window.remPhoto = (i, id) => { selectedPhotos.splice(i,1); renderPrevs(selectedPhotos, id); };
        document.getElementById('cameraInput').onchange = (e) => processFiles(e.target.files, selectedPhotos, 'preview-area');
        document.getElementById('editCameraInput').onchange = (e) => {
            for(let f of e.target.files) { const r = new FileReader(); r.onload = (ev) => { const img = new Image(); img.src = ev.target.result; img.onload = () => { const cv = document.createElement('canvas'); const mx=600; let w=img.width, h=img.height; if(w>h){ if(w>mx){ h*=mx/w; w=mx; } }else{ if(h>mx){ w*=mx/h; h=max; } } cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img, 0,0,w,h); editPhotos.push(cv.toDataURL('image/jpeg', 0.6)); renderEditPreview(); } }; r.readAsDataURL(f); }
        };

        // Chart & Excel เหมือนเดิม
        let sObj; window.updateDashboard = () => { const cs = {'เสร็จสิ้น': 0, 'กำลังทำ': 0, 'รอดำเนินการ': 0}; allTasks.forEach(t=>cs[t.status]++); document.getElementById('stat-total').innerText = allTasks.length; document.getElementById('stat-done').innerText = cs['เสร็จสิ้น']; const cx = document.getElementById('statusChart')?.getContext('2d'); if(!cx) return; if(sObj) sObj.destroy(); sObj = new Chart(cx, {type: 'doughnut', data: { labels: Object.keys(cs), datasets: [{ data: Object.values(cs), backgroundColor: ['#10b981', '#fbbf24', '#f43f5e'] }] }}); };
        window.exportToExcel = () => { const d = allTasks.map(t=>({"วันที่สร้าง": new Date(t.createdAt).toLocaleDateString('th-TH'), "ORS": t.ors, "ชื่องาน": t.title, "สถานะ": t.status, "รายละเอียด": t.detail})); const ws = XLSX.utils.json_to_sheet(d); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "WorkLog"); XLSX.writeFile(wb, `Report_${new Date().toISOString().split('T')[0]}.xlsx`); };
    </script>
</body>
</html>
