<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4M TASK - v2.2.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #10b981; --primary-dark: #059669; --bg: #f1f5f9;
            --text-main: #1e293b; --text-sub: #64748b; --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --status-wait: #ef4444; --status-doing: #f59e0b; --status-done: #10b981;
        }
        body { font-family: 'Kanit', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 50px; }
        .app-header { background: #fff; padding: 20px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .nav-tabs { display: flex; padding: 15px; gap: 8px; position: sticky; top: 0; background: var(--bg); z-index: 100; justify-content: center; }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 12px; background: #fff; color: var(--text-sub); cursor: pointer; transition: 0.3s; box-shadow: var(--shadow); font-family: 'Kanit'; font-weight: 500; }
        .tab-btn.active { background: var(--primary); color: #fff; transform: translateY(-2px); }
        .container { max-width: 700px; margin: 0 auto; padding: 0 15px; }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; box-shadow: var(--shadow); margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #e2e8f0; font-family: 'Kanit'; box-sizing: border-box; font-size: 1rem; outline: none; }
        .btn-main { background: var(--primary); color: #fff; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.2s; font-family: 'Kanit'; }
        .btn-main:active { transform: scale(0.98); }
        .btn-excel { background: #1d6f42; color: #fff; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: 600; cursor: pointer; margin-top: 15px; font-family: 'Kanit'; }
        
        .month-header { 
            background: #dcfce7; color: var(--primary-dark); padding: 12px 20px; 
            border-radius: 12px; display: flex; justify-content: space-between; align-items: center; 
            margin: 20px 0 10px 0; font-size: 1rem; font-weight: 700; cursor: pointer; 
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.15); transition: 0.2s; border: 1px solid #bbf7d0;
        }
        .month-header:hover { filter: brightness(0.95); transform: translateY(-1px); }
        .month-content { display: block; }
        .month-content.collapsed { display: none; }
        .chevron { transition: transform 0.3s ease; font-size: 0.9rem; }
        .chevron.rotated { transform: rotate(-90deg); }

        .task-card { background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: var(--shadow); position: relative; }
        .task-detail-box { background: #f8fafc; border-left: 4px solid #cbd5e1; padding: 10px 12px; margin: 8px 0; border-radius: 0 8px 8px 0; font-size: 0.9rem; color: #475569; white-space: pre-wrap; }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin: 10px 0; }
        .gallery img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; }
        .task-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px; border-top: 1px solid #f1f5f9; padding-top: 10px; }
        .btn-edit { background: #3b82f6; color: #fff; border: none; padding: 6px 15px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-family: 'Kanit'; }
        .btn-del { background: #ef4444; color: #fff; border: none; padding: 6px 15px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-family: 'Kanit'; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: #fff; padding: 15px; border-radius: 15px; text-align: center; box-shadow: var(--shadow); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-overlay.active { display: flex; animation: fadeIn 0.2s; }
        .modal-content { background: #fff; padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative; }
        .modal-close { position: absolute; top: 15px; right: 15px; background: #f1f5f9; border: none; width: 30px; height: 30px; border-radius: 50%; font-weight: bold; color: #64748b; cursor: pointer; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-cancel { background: #e2e8f0; color: #475569; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: 600; cursor: pointer; font-family: 'Kanit'; }
        
        .progress-wrapper { width: 100%; background: #e2e8f0; border-radius: 15px; height: 28px; position: relative; overflow: hidden; margin-top: 15px; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #10b981, #34d399); transition: width 0.3s ease; }
        .progress-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 0.9rem; font-weight: 700; color: #1e293b; text-shadow: 0px 0px 3px rgba(255,255,255,0.8); }
        
        .preview-img-container { position: relative; display: inline-block; }
        .remove-img-btn { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="app-header">
        <h1>4M TASK</h1>
        <div style="font-size: 0.75rem; color: var(--text-sub); font-weight: 500;">Version 2.2.1 | ธิติ พุกวิลัย</div>
    </div>

    <div class="nav-tabs">
        <button id="btn-add" class="tab-btn active" onclick="showSection('add')">➕ เพิ่มงาน</button>
        <button id="btn-view" class="tab-btn" onclick="showSection('view')">📁 คลังงาน</button>
        <button id="btn-dash" class="tab-btn" onclick="showSection('dash')">📊 สรุปผล</button>
    </div>

    <div class="container">
        <div id="section-add" class="page-section active">
            <div class="glass-card">
                <h3 style="margin-top:0;">บันทึกข้อมูลใหม่</h3>
                <input type="text" id="taskFullInput" placeholder="เลข-เดือน ชื่องาน (เช่น 01-21 งานทางหลวง)">
                <button onclick="document.getElementById('cameraInput').click()" style="width:100%; padding:10px; border:2px dashed #ccc; border-radius:10px; background:none; margin-bottom:15px; cursor:pointer; font-family:'Kanit';">📸 แนบรูปถ่าย</button>
                <input type="file" id="cameraInput" accept="image/*" multiple style="display:none;">
                <div id="preview-area" style="display:flex; gap:8px; overflow-x:auto; margin-bottom:10px; padding: 5px 0;"></div>
                <textarea id="taskDetail" rows="3" placeholder="รายละเอียดเพิ่มเติม (ถ้ามี)"></textarea>
                <select id="taskStatus">
                    <option value="รอดำเนินการ">🔴 รอดำเนินการ</option>
                    <option value="กำลังทำ">🟡 กำลังทำ</option>
                    <option value="เสร็จสิ้น">🟢 เสร็จสิ้น</option>
                </select>
                <button class="btn-main" onclick="addTask()">บันทึกข้อมูล</button>
            </div>
        </div>

        <div id="section-view" class="page-section">
            <input type="text" id="searchInput" placeholder="ค้นหาชื่องานหรือเลข ORS..." onkeyup="filterTasks()" style="width:100%; padding:12px; border-radius:10px; border:1px solid #e2e8f0; margin-bottom:5px;">
            <div id="task-container"></div>
        </div>

        <div id="section-dash" class="page-section">
            <div class="stat-grid">
                <div class="stat-box"><div id="stat-total" style="font-size:1.5rem; font-weight:700;">0</div><div>งานทั้งหมด</div></div>
                <div class="stat-box"><div id="stat-done" style="font-size:1.5rem; font-weight:700; color:var(--primary)">0</div><div>เสร็จสิ้น</div></div>
            </div>
            <div class="glass-card"><canvas id="statusChart"></canvas></div>
            <button class="btn-excel" onclick="exportToExcel()">📗 ส่งออกเป็น Excel</button>
        </div>
    </div>

    <div id="loadingModal" class="modal-overlay">
        <div class="modal-content" style="text-align: center; max-width: 300px;">
            <h4 id="loadingTitle" style="margin: 0 0 10px 0;">กำลังประมวลผล...</h4>
            <div class="progress-wrapper">
                <div id="progressBar" class="progress-bar"></div>
                <div id="progressText" class="progress-text">0%</div>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" onclick="closeEditModal()">✕</button>
            <h3 style="margin-top:0;">📝 แก้ไขข้อมูล</h3>
            <input type="text" id="editFullInput" placeholder="เลข-เดือน ชื่องาน">
            <button onclick="document.getElementById('editCameraInput').click()" style="width:100%; padding:10px; border:2px dashed #ccc; border-radius:10px; background:none; margin-bottom:15px; cursor:pointer; font-family:'Kanit';">📸 เพิ่มรูปถ่าย</button>
            <input type="file" id="editCameraInput" accept="image/*" multiple style="display:none;">
            <div id="edit-preview-area" style="display:flex; gap:8px; overflow-x:auto; margin-bottom:10px; padding: 5px 0;"></div>
            <textarea id="editDetail" rows="3" placeholder="รายละเอียดเพิ่มเติม"></textarea>
            <select id="editStatus">
                <option value="รอดำเนินการ">🔴 รอดำเนินการ</option>
                <option value="กำลังทำ">🟡 กำลังทำ</option>
                <option value="เสร็จสิ้น">🟢 เสร็จสิ้น</option>
            </select>
            <div class="btn-group">
                <button class="btn-cancel" onclick="closeEditModal()">ยกเลิก</button>
                <button class="btn-main" onclick="saveEdit()">อัปเดตข้อมูล</button>
            </div>
        </div>
    </div>

    <div id="deleteModal" class="modal-overlay">
        <div class="modal-content" style="text-align: center; max-width: 320px;">
            <h3 style="color: #ef4444; margin-top: 0;">⚠️ ยืนยันการลบ</h3>
            <p style="color: var(--text-sub); font-size: 0.95rem;">คุณแน่ใจหรือไม่ที่จะลบงานนี้? ข้อมูลจะไม่สามารถกู้คืนได้</p>
            <div class="btn-group">
                <button class="btn-cancel" onclick="closeDeleteModal()">ยกเลิก</button>
                <button class="btn-main" style="background: #ef4444;" onclick="executeDelete()">ยืนยันการลบ</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBwNltx2biA-AdM44HjHay-4gO4N1RH_sQ", 
            authDomain: "mytaskapp-pro.firebaseapp.com", 
            projectId: "mytaskapp-pro", 
            storageBucket: "mytaskapp-pro.firebasestorage.app", 
            messagingSenderId: "189296604432", 
            appId: "1:189296604432:web:31dabc3c5e363b2c96a195" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allTasks = [], selectedPhotos = [], editPhotos = [], statusChart;
        let editingId = null, deletingId = null;
        const monthNames = ["ทั่วไป", "มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

        window.showSection = (name) => {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('section-' + name).classList.add('active');
            document.getElementById('btn-' + name).classList.add('active');
            if(name === 'dash') updateDashboard();
        };

        async function runWithProgress(title, taskPromiseFn) {
            const modal = document.getElementById('loadingModal');
            const bar = document.getElementById('progressBar');
            const text = document.getElementById('progressText');
            document.getElementById('loadingTitle').innerText = title;
            modal.classList.add('active');
            bar.style.width = '0%'; text.innerText = '0%';
            let p = 0;
            let interval = setInterval(() => {
                if(p < 85) { p += Math.floor(Math.random() * 15) + 5; if(p > 85) p = 85; }
                bar.style.width = p + '%'; text.innerText = p + '%';
            }, 300);
            try {
                await taskPromiseFn();
                clearInterval(interval);
                bar.style.width = '100%'; text.innerText = '100%';
                await new Promise(r => setTimeout(r, 600)); 
                modal.classList.remove('active');
            } catch (e) {
                clearInterval(interval);
                modal.classList.remove('active');
                alert("เกิดข้อผิดพลาด: " + e.message);
            }
        }

        async function compressImg(base64) {
            return new Promise(res => {
                const img = new Image(); img.src = base64;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = 500; let w = img.width, h = img.height;
                    if (w > h) { if(w > max) { h *= max/w; w = max; } } else { if(h > max) { w *= max/h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    res(canvas.toDataURL('image/jpeg', 0.5));
                };
            });
        }

        window.addTask = async () => {
            const raw = document.getElementById('taskFullInput').value;
            if(!raw) return alert("กรุณากรอกข้อมูลงาน");
            await runWithProgress("กำลังบันทึกงานใหม่...", async () => {
                const match = raw.match(/^(\d{1,2})\s*[-/]\s*(\d{1,2})\s+(.*)$/);
                const ors = match ? `ORS.${match[1]}/${match[2]}` : "ORS.00/00";
                const title = match ? match[3].trim() : raw;
                const compressed = [];
                for(let p of selectedPhotos) { 
                    if(p.startsWith('data:image')) compressed.push(await compressImg(p));
                    else compressed.push(p);
                }
                const data = {
                    ors, title, detail: document.getElementById('taskDetail').value,
                    status: document.getElementById('taskStatus').value, photos: compressed,
                    createdAt: new Date().getTime(), updatedAt: new Date().getTime()
                };
                await addDoc(collection(db, "tasks"), data);
                document.getElementById('taskFullInput').value = "";
                document.getElementById('taskDetail').value = "";
                document.getElementById('taskStatus').value = "รอดำเนินการ";
                selectedPhotos = []; renderPreview();
            });
        };

        window.openEditModal = (id) => {
            const t = allTasks.find(x => x.id === id);
            if(!t) return;
            editingId = id;
            document.getElementById('editFullInput').value = (t.ors || "").replace('ORS.', '').replace('/', '-') + " " + (t.title || "");
            document.getElementById('editDetail').value = t.detail || "";
            document.getElementById('editStatus').value = t.status || "รอดำเนินการ";
            editPhotos = [...(t.photos || [])];
            renderEditPreview();
            document.getElementById('editModal').classList.add('active');
        };

        window.closeEditModal = () => { editingId = null; document.getElementById('editModal').classList.remove('active'); };

        window.saveEdit = async () => {
            if(!editingId) return;
            const raw = document.getElementById('editFullInput').value;
            if(!raw) return alert("กรุณากรอกข้อมูลงาน");
            await runWithProgress("กำลังอัปเดตข้อมูล...", async () => {
                const match = raw.match(/^(\d{1,2})\s*[-/]\s*(\d{1,2})\s+(.*)$/);
                const ors = match ? `ORS.${match[1]}/${match[2]}` : "ORS.00/00";
                const title = match ? match[3].trim() : raw;
                const compressed = [];
                for(let p of editPhotos) { 
                    if(p.startsWith('data:image')) compressed.push(await compressImg(p));
                    else compressed.push(p);
                }
                const data = {
                    ors, title, detail: document.getElementById('editDetail').value,
                    status: document.getElementById('editStatus').value, photos: compressed,
                    updatedAt: new Date().getTime()
                };
                await updateDoc(doc(db, "tasks", editingId), data);
                closeEditModal();
            });
        };

        window.confirmDelete = (id) => { deletingId = id; document.getElementById('deleteModal').classList.add('active'); };
        window.closeDeleteModal = () => { deletingId = null; document.getElementById('deleteModal').classList.remove('active'); };
        window.executeDelete = async () => {
            if(!deletingId) return;
            await runWithProgress("กำลังลบข้อมูล...", async () => {
                await deleteDoc(doc(db, "tasks", deletingId));
                closeDeleteModal();
            });
        };

        document.getElementById('cameraInput').onchange = (e) => {
            for (let f of e.target.files) { const r = new FileReader(); r.onload = (ev) => { selectedPhotos.push(ev.target.result); renderPreview(); }; r.readAsDataURL(f); }
        };
        document.getElementById('editCameraInput').onchange = (e) => {
            for (let f of e.target.files) { const r = new FileReader(); r.onload = (ev) => { editPhotos.push(ev.target.result); renderEditPreview(); }; r.readAsDataURL(f); }
        };

        function renderPreview() {
            const area = document.getElementById('preview-area'); area.innerHTML = "";
            selectedPhotos.forEach((p, idx) => { area.innerHTML += `<div class="preview-img-container"><img src="${p}" style="width:60px; height:60px; object-fit:cover; border-radius:8px;"><button class="remove-img-btn" onclick="removePhoto('add', ${idx})">×</button></div>`; });
        }
        function renderEditPreview() {
            const area = document.getElementById('edit-preview-area'); area.innerHTML = "";
            editPhotos.forEach((p, idx) => { area.innerHTML += `<div class="preview-img-container"><img src="${p}" style="width:60px; height:60px; object-fit:cover; border-radius:8px;"><button class="remove-img-btn" onclick="removePhoto('edit', ${idx})">×</button></div>`; });
        }

        window.removePhoto = (type, index) => { if(type === 'add') { selectedPhotos.splice(index, 1); renderPreview(); } else { editPhotos.splice(index, 1); renderEditPreview(); } };

        onSnapshot(collection(db, "tasks"), (snap) => {
            allTasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            allTasks.sort((a, b) => (a.ors || "").localeCompare(b.ors || ""));
            filterTasks();
            if(document.getElementById('section-dash').classList.contains('active')) updateDashboard();
        });

        window.toggleMonth = (monthId) => {
            const content = document.getElementById(`content-${monthId}`);
            const icon = document.getElementById(`icon-${monthId}`);
            if (content.classList.contains('collapsed')) { content.classList.remove('collapsed'); icon.classList.remove('rotated'); }
            else { content.classList.add('collapsed'); icon.classList.add('rotated'); }
        };

        window.filterTasks = () => {
            const container = document.getElementById('task-container'); container.innerHTML = "";
            const search = document.getElementById('searchInput').value.toLowerCase();
            const groupedTasks = {};
            allTasks.filter(t => (t.title||"").toLowerCase().includes(search) || (t.ors||"").includes(search) || (t.detail||"").toLowerCase().includes(search)).forEach(t => {
                let mName = "ทั่วไป";
                try {
                    const mIdx = parseInt(t.ors.split('/')[0].split('.')[1]);
                    if(mIdx > 0 && mIdx <= 12) mName = monthNames[mIdx];
                } catch(e) {}
                if(!groupedTasks[mName]) groupedTasks[mName] = [];
                groupedTasks[mName].push(t);
            });
            const orderedMonths = monthNames.filter(m => groupedTasks[m]);
            orderedMonths.forEach(mName => {
                const tasksInMonth = groupedTasks[mName];
                const safeId = mName.replace(/\s+/g, '');
                let html = `
                    <div class="month-header" onclick="toggleMonth('${safeId}')">
                        <span>📅 เดือน${mName} <span style="font-size:0.8rem; color:var(--text-sub); background:#fff; padding:2px 8px; border-radius:10px; margin-left:5px;">${tasksInMonth.length} งาน</span></span>
                        <span id="icon-${safeId}" class="chevron">▼</span>
                    </div>
                    <div id="content-${safeId}" class="month-content">
                `;
                tasksInMonth.forEach(t => {
                    let c = t.status === "เสร็จสิ้น" ? "var(--status-done)" : (t.status === "กำลังทำ" ? "var(--status-doing)" : "var(--status-wait)");
                    let detailHtml = t.detail ? `<div class="task-detail-box">${t.detail}</div>` : '';
                    html += `
                        <div class="task-card" style="border-left: 6px solid ${c}">
                            <div style="display:flex; justify-content:space-between;"><b>${t.ors}</b> <span style="color:${c}; font-weight:600;">${t.status}</span></div>
                            <div style="margin:8px 0 5px 0; font-weight:600; font-size: 1.05rem;">${t.title}</div>
                            ${detailHtml}
                            <div class="gallery">${(t.photos||[]).map(p => `<img src="${p}">`).join('')}</div>
                            <div class="task-actions">
                                <button class="btn-edit" onclick="openEditModal('${t.id}')">แก้ไข</button>
                                <button class="btn-del" onclick="confirmDelete('${t.id}')">ลบ</button>
                            </div>
                        </div>`;
                });
                html += `</div>`; container.innerHTML += html;
            });
            if(Object.keys(groupedTasks).length === 0) container.innerHTML = `<div style="text-align:center; padding: 20px; color: var(--text-sub);">ไม่พบข้อมูลที่ค้นหา</div>`;
        };

        window.updateDashboard = () => {
            const counts = { 'เสร็จสิ้น': 0, 'กำลังทำ': 0, 'รอดำเนินการ': 0 };
            allTasks.forEach(t => counts[t.status]++);
            document.getElementById('stat-total').innerText = allTasks.length;
            document.getElementById('stat-done').innerText = counts['เสร็จสิ้น'];
            const ctx = document.getElementById('statusChart').getContext('2d');
            if(statusChart) statusChart.destroy();
            statusChart = new Chart(ctx, {
                type: 'doughnut', data: { labels: Object.keys(counts), datasets: [{ data: Object.values(counts), backgroundColor: ['#10b981', '#f59e0b', '#ef4444'] }] },
                options: { plugins: { legend: { position: 'bottom', labels: { font: { family: 'Kanit' } } } } }
            });
        };

        window.exportToExcel = () => {
            const data = allTasks.map(t => ({ "ORS": t.ors, "งาน": t.title, "รายละเอียด": t.detail || "-", "สถานะ": t.status }));
            const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Tasks"); XLSX.writeFile(wb, "4M_Task.xlsx");
        };

        window.openEditModal = openEditModal; window.closeEditModal = closeEditModal;
        window.saveEdit = saveEdit; window.confirmDelete = confirmDelete;
        window.closeDeleteModal = closeDeleteModal; window.executeDelete = executeDelete;
        window.removePhoto = removePhoto; window.toggleMonth = toggleMonth;
    </script>
</body>
</html>
