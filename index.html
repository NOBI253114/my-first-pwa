<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4M TASK - Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.96);
            --primary: #6366f1;
            --accent: #a855f7;
            --bg: #0f172a;
            --text: #1e293b;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            background-attachment: fixed;
            color: white; margin: 0; padding: 20px; padding-bottom: 120px;
        }

        /* App Header */
        .app-header { text-align: center; margin-bottom: 30px; }
        .app-header h1 {
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0; font-weight: 700; font-size: 2.2rem; letter-spacing: 2px;
        }
        .version-tag {
            display: inline-block; background: rgba(255,255,255,0.1);
            padding: 2px 12px; border-radius: 20px; font-size: 0.75rem;
            margin-top: 5px; color: #94a3b8; border: 1px solid rgba(255,255,255,0.1);
        }

        /* Form Card */
        .glass-card {
            background: var(--glass); backdrop-filter: blur(10px);
            border-radius: 24px; padding: 25px; margin-bottom: 30px;
            color: var(--text); box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .ors-input { border: 2px solid var(--primary) !important; background: #eef2ff !important; font-weight: 600; color: var(--primary); }

        input, textarea, select {
            width: 100%; padding: 14px; margin-bottom: 15px;
            border-radius: 12px; border: 1px solid #e2e8f0;
            font-family: 'Kanit', sans-serif; box-sizing: border-box; font-size: 1rem;
        }

        .btn-main {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; border: none; padding: 16px; border-radius: 14px;
            width: 100%; font-weight: 500; font-size: 1.1rem; cursor: pointer; transition: 0.2s;
        }
        .btn-main:active { transform: scale(0.98); }

        .btn-photo {
            background: #f1f5f9; color: #475569; border: 2px dashed #cbd5e1;
            padding: 12px; border-radius: 12px; text-align: center;
            margin-bottom: 15px; cursor: pointer; font-weight: 500;
        }

        /* Task List Grouping */
        .month-group { margin-top: 40px; }
        .month-title {
            font-size: 1.3rem; margin-bottom: 15px; padding-left: 10px;
            border-left: 4px solid var(--accent); color: #cbd5e1;
        }

        .task-card {
            background: white; border-radius: 20px; padding: 20px;
            margin-bottom: 20px; color: var(--text); box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .ors-label {
            font-size: 0.85rem; font-weight: 600; color: var(--primary);
            background: #eef2ff; padding: 2px 10px; border-radius: 6px;
            display: inline-block; margin-bottom: 8px;
        }

        .badge {
            padding: 4px 12px; border-radius: 8px; font-size: 0.8rem;
            font-weight: 500; color: white; float: right;
        }
        .st-รอดำเนินการ { background: #64748b; }
        .st-กำลังทำ { background: #f59e0b; }
        .st-เสร็จสิ้น { background: #10b981; }

        .gallery { display: flex; gap: 10px; overflow-x: auto; margin: 15px 0; padding-bottom: 5px; }
        .gallery img { width: 140px; height: 100px; object-fit: cover; border-radius: 12px; cursor: pointer; }

        .actions { display: flex; gap: 15px; margin-top: 15px; border-top: 1px solid #f1f5f9; padding-top: 15px; }
        .btn-edit { color: var(--primary); cursor: pointer; font-weight: 500; border: none; background: none; font-family: inherit; }
        .btn-delete { color: #ef4444; cursor: pointer; font-weight: 500; border: none; background: none; font-family: inherit; }

        /* Slider & Overlay */
        .slider-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 5000; justify-content: center; align-items: center;
        }
        .slider-img { max-width: 95%; max-height: 80%; object-fit: contain; }
        .nav-btn { position: absolute; top: 50%; color: white; background: none; border: none; font-size: 2.5rem; cursor: pointer; padding: 10px; }
        .nav-prev { left: 10px; } .nav-next { right: 10px; }
        .img-counter { position: absolute; bottom: 30px; color: white; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; }

        /* Footer Credits */
        .app-footer {
            text-align: center; padding: 20px 0; margin-top: 50px;
            border-top: 1px solid rgba(255,255,255,0.1); color: #64748b; font-size: 0.85rem;
        }

        /* Modal Edit */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-height: 85vh; border-radius: 24px; padding: 25px; overflow-y: auto; color: var(--text); }
        
        #preview-area { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 10px; }
        #preview-area img { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="app-header">
        <h1>4M TASK</h1>
        <div class="version-tag">Build v1.2.0 (Stable)</div>
    </div>

    <div class="glass-card">
        <label style="font-size: 0.85rem; font-weight: 500; color: #64748b;">ลำดับงาน (ORS Reference)</label>
        <input type="text" id="taskOrs" class="ors-input" placeholder="ORS.01/01">
        
        <input type="file" id="cameraInput" accept="image/*" multiple style="display: none;">
        <div class="btn-photo" onclick="document.getElementById('cameraInput').click()">📸 คลิกเพื่อแนบรูปภาพ</div>
        <div id="preview-area"></div>
        
        <input type="text" id="taskTitle" placeholder="ชื่องาน...">
        <textarea id="taskDetail" rows="2" placeholder="รายละเอียดงาน..."></textarea>
        
        <select id="taskStatus">
            <option value="รอดำเนินการ">รอดำเนินการ</option>
            <option value="กำลังทำ">กำลังทำ</option>
            <option value="เสร็จสิ้น">เสร็จสิ้น</option>
        </select>
        <button class="btn-main" onclick="addTask()">บันทึกข้อมูลลงระบบ</button>
    </div>

    <div id="task-container"></div>

    <div id="sliderOverlay" class="slider-overlay" onclick="closeSlider()">
        <button class="nav-btn nav-prev" onclick="event.stopPropagation(); changeSlide(-1)">❮</button>
        <img id="sliderImg" class="slider-img" onclick="event.stopPropagation()">
        <button class="nav-btn nav-next" onclick="event.stopPropagation(); changeSlide(1)">❯</button>
        <div id="imgCounter" class="img-counter">1 / 1</div>
        <div style="position:absolute; top:20px; right:20px; color:white; cursor:pointer;">✕ ปิด</div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top: 0;">แก้ไขรายละเอียดงาน</h2>
            <input type="hidden" id="editId">
            <label style="font-size:0.8rem; color:#64748b;">เลข ORS</label>
            <input type="text" id="editOrs" class="ors-input">
            <label style="font-size:0.8rem; color:#64748b;">ชื่องาน</label>
            <input type="text" id="editTitle">
            <label style="font-size:0.8rem; color:#64748b;">รายละเอียด</label>
            <textarea id="editDetail" rows="3"></textarea>
            <select id="editStatus">
                <option value="รอดำเนินการ">รอดำเนินการ</option>
                <option value="กำลังทำ">กำลังทำ</option>
                <option value="เสร็จสิ้น">เสร็จสิ้น</option>
            </select>
            <button class="btn-main" onclick="updateTask()">อัปเดตข้อมูล</button>
            <button style="background:none; border:none; color: #94a3b8; width:100%; margin-top:15px; cursor:pointer;" onclick="closeModal()">ยกเลิก</button>
        </div>
    </div>

    <div class="app-footer">
        <div>&copy; 2026 4M TASK ระบบจัดการงานอัจฉริยะ</div>
        <div style="font-weight: 500; color: #cbd5e1; margin-top: 5px;">พัฒนาโดย นาย ธิติ พุกวิลัย</div>
        <div style="font-size: 0.7rem; margin-top: 10px; opacity: 0.5;">Running on Google Firebase Cloud Platform</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Config ของคุณ
        const firebaseConfig = {
            apiKey: "AIzaSyBwNltx2biA-AdM44HjHay-4gO4N1RH_sQ",
            authDomain: "mytaskapp-pro.firebaseapp.com",
            projectId: "mytaskapp-pro",
            storageBucket: "mytaskapp-pro.firebasestorage.app",
            messagingSenderId: "189296604432",
            appId: "1:189296604432:web:31dabc3c5e363b2c96a195",
            measurementId: "G-MRE5GH4CYH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let selectedPhotos = [];
        let sliderPhotos = [];
        let currentIdx = 0;

        async function resizeImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const maxWidth = 500; 
                        let width = img.width, height = img.height;
                        if (width > maxWidth) { height = (maxWidth / width) * height; width = maxWidth; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.4)); 
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        document.getElementById('cameraInput').onchange = async (e) => {
            const files = Array.from(e.target.files);
            for (let file of files) {
                const base64 = await resizeImage(file);
                selectedPhotos.push(base64);
                const img = document.createElement('img');
                img.src = base64;
                document.getElementById('preview-area').appendChild(img);
            }
        };

        window.addTask = async () => {
            const ors = document.getElementById('taskOrs').value;
            const title = document.getElementById('taskTitle').value;
            const detail = document.getElementById('taskDetail').value;
            const status = document.getElementById('taskStatus').value;
            if (!ors || !title) return alert("กรุณาระบุ ORS และ ชื่องาน");

            try {
                await addDoc(collection(db, "tasks"), {
                    ors, title, detail, status,
                    photos: selectedPhotos, 
                    createdAt: new Date().getTime()
                });
                document.getElementById('taskOrs').value = "";
                document.getElementById('taskTitle').value = "";
                document.getElementById('taskDetail').value = "";
                document.getElementById('preview-area').innerHTML = "";
                selectedPhotos = [];
            } catch (err) { alert(err.message); }
        };

        onSnapshot(query(collection(db, "tasks"), orderBy("createdAt", "desc")), (snap) => {
            const container = document.getElementById('task-container');
            container.innerHTML = "";
            let currentMonth = "";

            snap.forEach((docSnap) => {
                const d = docSnap.data();
                const date = new Date(d.createdAt);
                const monthLabel = date.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' });

                if (currentMonth !== monthLabel) {
                    currentMonth = monthLabel;
                    container.innerHTML += `<div class="month-group"><div class="month-title">${currentMonth}</div></div>`;
                }

                const photoString = JSON.stringify(d.photos || []);
                const gallery = d.photos ? `<div class="gallery">${d.photos.map((u, i) => `<img src="${u}" onclick='openSlider(${photoString}, ${i})' loading="lazy">`).join('')}</div>` : "";
                
                const cardHtml = `
                    <div class="task-card">
                        <span class="badge st-${d.status}">${d.status}</span>
                        <div class="ors-label">${d.ors || 'N/A'}</div>
                        <div style="font-weight:600; font-size:1.1rem; margin-top:5px;">${d.title}</div>
                        <p style="color:#64748b; margin:8px 0; font-size:0.9rem;">${d.detail || ''}</p>
                        ${gallery}
                        <div class="actions">
                            <div class="btn-edit" onclick="openEdit('${docSnap.id}', '${d.ors || ""}', '${d.title}', '${d.detail || ""}', '${d.status}')">✏️ แก้ไข</div>
                            <div class="btn-delete" onclick="deleteTask('${docSnap.id}')">🗑️ ลบ</div>
                        </div>
                    </div>`;
                container.lastChild.innerHTML += cardHtml;
            });
        });

        // ระบบ Slider
        window.openSlider = (photos, index) => {
            sliderPhotos = photos;
            currentIdx = index;
            updateSlider();
            document.getElementById('sliderOverlay').style.display = 'flex';
        };
        window.changeSlide = (n) => {
            currentIdx += n;
            if (currentIdx >= sliderPhotos.length) currentIdx = 0;
            if (currentIdx < 0) currentIdx = sliderPhotos.length - 1;
            updateSlider();
        };
        function updateSlider() {
            document.getElementById('sliderImg').src = sliderPhotos[currentIdx];
            document.getElementById('imgCounter').innerText = `${currentIdx + 1} / ${sliderPhotos.length}`;
        }
        window.closeSlider = () => document.getElementById('sliderOverlay').style.display = 'none';

        // CRUD
        window.openEdit = (id, ors, title, detail, status) => {
            document.getElementById('editId').value = id;
            document.getElementById('editOrs').value = ors;
            document.getElementById('editTitle').value = title;
            document.getElementById('editDetail').value = detail;
            document.getElementById('editStatus').value = status;
            document.getElementById('editModal').style.display = 'flex';
        };
        window.closeModal = () => document.getElementById('editModal').style.display = 'none';
        window.updateTask = async () => {
            const id = document.getElementById('editId').value;
            await updateDoc(doc(db, "tasks", id), {
                ors: document.getElementById('editOrs').value,
                title: document.getElementById('editTitle').value,
                detail: document.getElementById('editDetail').value,
                status: document.getElementById('editStatus').value
            });
            closeModal();
        };
        window.deleteTask = async (id) => { if(confirm("ยืนยันการลบ?")) await deleteDoc(doc(db, "tasks", id)); };
    </script>
</body>
</html>
