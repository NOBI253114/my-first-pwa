<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4M TASK</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --primary: #10b981; --primary-dark: #059669; --bg: #f8fafc;
            --text-main: #1e293b; --text-sub: #64748b; --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        body { font-family: 'Kanit', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 50px; }
        
        .app-header { background: #fff; padding: 20px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .app-header h1 { margin: 0; font-size: 1.5rem; color: var(--primary-dark); }

        .nav-tabs { display: flex; padding: 15px; gap: 8px; position: sticky; top: 0; background: var(--bg); z-index: 100; justify-content: center; }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 12px; background: #fff; color: var(--text-sub); cursor: pointer; transition: 0.3s; box-shadow: var(--shadow); font-family: 'Kanit'; font-weight: 500; }
        .tab-btn.active { background: var(--primary); color: #fff; }

        .container { max-width: 700px; margin: 0 auto; padding: 0 15px; }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glass-card { background: #fff; border-radius: 20px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 20px; }
        .label-text { font-size: 0.85rem; color: var(--text-sub); margin-bottom: 5px; display: block; font-weight: 500; }
        
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #e2e8f0; font-family: 'Kanit'; box-sizing: border-box; font-size: 1rem; outline: none; }
        .btn-main { background: var(--primary); color: #fff; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 600; cursor: pointer; margin-bottom: 10px; }

        .task-card { background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 15px; border-left: 5px solid var(--primary); box-shadow: var(--shadow); }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin: 10px 0; }
        .gallery img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; cursor: pointer; }

        /* Slider Overlay */
        .slider-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; justify-content: center; align-items: center; }
        .slider-img { max-width: 90%; max-height: 75%; object-fit: contain; border-radius: 5px; }
        .slider-nav { position: absolute; top: 50%; color: white; font-size: 2.5rem; background: none; border: none; cursor: pointer; padding: 20px; user-select: none; }
        .nav-prev { left: 0; }
        .nav-next { right: 0; }
        .slider-close { position: absolute; top: 20px; right: 20px; color: white; font-size: 1.5rem; background: none; border: none; cursor: pointer; }
        .slider-counter { position: absolute; bottom: 30px; color: white; font-size: 0.9rem; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; }

        /* Stat Cards */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #fff; padding: 15px; border-radius: 15px; text-align: center; box-shadow: var(--shadow); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; width: 90%; max-width: 500px; border-radius: 20px; padding: 20px; }
    </style>
</head>
<body>

    <div class="app-header">
        <h1>4M TASK</h1>
        <div style="font-size: 0.7rem; color: var(--text-sub);">Version 1.8.0 | พัฒนาโดย นาย ธิติ พุกวิลัย</div>
    </div>

    <div class="nav-tabs">
        <button id="btn-add" class="tab-btn active" onclick="showSection('add')">➕ เพิ่มงาน</button>
        <button id="btn-view" class="tab-btn" onclick="showSection('view')">📁 คลังงาน</button>
        <button id="btn-dash" class="tab-btn" onclick="showSection('dash')">📊 สรุปผล</button>
    </div>

    <div class="container">
        <div id="section-add" class="page-section active">
            <div class="glass-card">
                <span class="label-text">เลขที่งาน (ORS.)</span>
                <input type="text" id="taskOrs" placeholder="เช่น 01/01">
                <button onclick="document.getElementById('cameraInput').click()" style="width:100%; padding:10px; border:2px dashed #ccc; border-radius:10px; background:none; margin-bottom:15px; font-family:inherit; cursor:pointer; color: var(--text-sub);">📸 แนบรูปถ่าย</button>
                <input type="file" id="cameraInput" accept="image/*" multiple style="display:none;">
                <div id="preview-area" style="display:flex; gap:8px; overflow-x:auto; margin-bottom:10px;"></div>
                <input type="text" id="taskTitle" placeholder="ชื่องาน">
                <textarea id="taskDetail" rows="3" placeholder="รายละเอียด"></textarea>
                <select id="taskStatus">
                    <option value="รอดำเนินการ">รอดำเนินการ</option>
                    <option value="กำลังทำ">กำลังทำ</option>
                    <option value="เสร็จสิ้น">เสร็จสิ้น</option>
                </select>
                <button class="btn-main" onclick="addTask()">บันทึกข้อมูล</button>
            </div>
        </div>

        <div id="section-view" class="page-section">
            <input type="text" id="searchInput" placeholder="ค้นหาชื่องาน หรือเลข ORS..." onkeyup="filterTasks()" style="margin-bottom:10px;">
            <select id="filterStatus" onchange="filterTasks()" style="margin-bottom:15px;">
                <option value="ทั้งหมด">แสดงสถานะ: ทั้งหมด</option>
                <option value="รอดำเนินการ">รอดำเนินการ</option>
                <option value="กำลังทำ">กำลังทำ</option>
                <option value="เสร็จสิ้น">เสร็จสิ้น</option>
            </select>
            <div id="task-container"></div>
        </div>

        <div id="section-dash" class="page-section">
            <div class="stat-grid">
                <div class="stat-card"><b>งานทั้งหมด</b><div id="stat-total" style="font-size:1.5rem; color:var(--primary-dark);">0</div></div>
                <div class="stat-card"><b>เสร็จแล้ว</b><div id="stat-done" style="font-size:1.5rem; color:var(--primary);">0</div></div>
            </div>
            <div class="glass-card"><canvas id="statusChart"></canvas></div>
            <button class="btn-main" style="background:#475569;" onclick="exportToCSV()">📤 ส่งออก Excel (.csv)</button>
            <button class="btn-main" style="background:#ef4444;" onclick="exportToPDF()">📄 ส่งออก PDF (.pdf)</button>
        </div>
    </div>

    <div id="sliderOverlay" class="slider-overlay">
        <button class="slider-close" onclick="closeSlider()">✕</button>
        <button class="slider-nav nav-prev" onclick="changeSlide(-1)">❮</button>
        <img id="sliderImg" class="slider-img">
        <button class="slider-nav nav-next" onclick="changeSlide(1)">❯</button>
        <div id="sliderCounter" class="slider-counter">1 / 1</div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>แก้ไขงาน</h3>
            <input type="hidden" id="editId">
            <input type="text" id="editOrs" placeholder="เลข ORS">
            <input type="text" id="editTitle" placeholder="ชื่องาน">
            <textarea id="editDetail" rows="3"></textarea>
            <select id="editStatus">
                <option value="รอดำเนินการ">รอดำเนินการ</option>
                <option value="กำลังทำ">กำลังทำ</option>
                <option value="เสร็จสิ้น">เสร็จสิ้น</option>
            </select>
            <div style="display:flex; gap:10px;">
                <button class="btn-main" onclick="updateTask()">อัปเดต</button>
                <button class="btn-main" style="background:#e2e8f0; color:#64748b;" onclick="document.getElementById('editModal').style.display='none'">ปิด</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBwNltx2biA-AdM44HjHay-4gO4N1RH_sQ",
            authDomain: "mytaskapp-pro.firebaseapp.com",
            projectId: "mytaskapp-pro",
            storageBucket: "mytaskapp-pro.firebasestorage.app",
            messagingSenderId: "189296604432",
            appId: "1:189296604432:web:31dabc3c5e363b2c96a195",
            measurementId: "G-MRE5GH4CYH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allTasks = [];
        let selectedPhotos = [];
        let currentPhotos = [];
        let currentPhotoIdx = 0;
        let statusChart;

        window.showSection = (name) => {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('section-' + name).classList.add('active');
            document.getElementById('btn-' + name).classList.add('active');
            if(name === 'dash') updateDashboard();
        };

        onSnapshot(query(collection(db, "tasks"), orderBy("ors", "asc")), (snap) => {
            allTasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            filterTasks();
            updateDashboard();
        });

        window.addTask = async () => {
            const val = document.getElementById('taskOrs').value;
            if(!val || !document.getElementById('taskTitle').value) return alert("กรุณากรอกข้อมูลให้ครบ");
            await addDoc(collection(db, "tasks"), {
                ors: "ORS." + val, title: document.getElementById('taskTitle').value,
                detail: document.getElementById('taskDetail').value,
                status: document.getElementById('taskStatus').value,
                photos: selectedPhotos, createdAt: new Date().getTime()
            });
            alert("บันทึกสำเร็จ!"); location.reload();
        };

        window.filterTasks = () => {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('filterStatus').value;
            const container = document.getElementById('task-container');
            container.innerHTML = "";
            
            allTasks.filter(t => {
                const matchSearch = t.title.toLowerCase().includes(search) || t.ors.toLowerCase().includes(search);
                const matchStatus = status === 'ทั้งหมด' || t.status === status;
                return matchSearch && matchStatus;
            }).forEach(t => {
                container.innerHTML += `
                    <div class="task-card">
                        <div style="display:flex; justify-content:space-between; font-size:0.8rem;">
                            <span style="font-weight:700; color:var(--primary-dark);">${t.ors}</span>
                            <span style="color:${t.status==='เสร็จสิ้น'?'#10b981':'#f59e0b'}">${t.status}</span>
                        </div>
                        <div style="font-weight:600; margin:8px 0;">${t.title}</div>
                        <div class="gallery">${(t.photos||[]).map((p, i) => `<img src="${p}" onclick="openSlider(${JSON.stringify(t.photos).replace(/"/g, '&quot;')}, ${i})">`).join('')}</div>
                        <div style="display:flex; justify-content:flex-end; gap:15px; margin-top:10px;">
                            <span style="color:var(--primary); cursor:pointer; font-size:0.85rem;" onclick="openEdit('${t.id}','${t.ors}','${t.title}','${t.detail}','${t.status}')">แก้ไข</span>
                            <span style="color:#ef4444; cursor:pointer; font-size:0.85rem;" onclick="deleteTask('${t.id}')">ลบ</span>
                        </div>
                    </div>`;
            });
        };

        // Slider Logic
        window.openSlider = (photos, index) => {
            currentPhotos = photos;
            currentPhotoIdx = index;
            updateSliderView();
            document.getElementById('sliderOverlay').style.display = 'flex';
        };
        window.changeSlide = (n) => {
            currentPhotoIdx = (currentPhotoIdx + n + currentPhotos.length) % currentPhotos.length;
            updateSliderView();
        };
        function updateSliderView() {
            document.getElementById('sliderImg').src = currentPhotos[currentPhotoIdx];
            document.getElementById('sliderCounter').innerText = `${currentPhotoIdx + 1} / ${currentPhotos.length}`;
        }
        window.closeSlider = () => document.getElementById('sliderOverlay').style.display = 'none';

        // Dashboard & Export
        function updateDashboard() {
            const total = allTasks.length;
            const done = allTasks.filter(t => t.status === 'เสร็จสิ้น').length;
            const doing = allTasks.filter(t => t.status === 'กำลังทำ').length;
            const pending = allTasks.filter(t => t.status === 'รอดำเนินการ').length;
            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-done').innerText = done;

            const ctx = document.getElementById('statusChart').getContext('2d');
            if(statusChart) statusChart.destroy();
            statusChart = new Chart(ctx, {
                type: 'pie',
                data: { labels: ['เสร็จสิ้น', 'กำลังทำ', 'รอดำเนินการ'], datasets: [{ data: [done, doing, pending], backgroundColor: ['#10b981', '#f59e0b', '#ef4444'] }] }
            });
        }

        window.exportToCSV = () => {
            let csv = "ORS,Title,Detail,Status\n";
            allTasks.forEach(t => csv += `${t.ors},${t.title},${t.detail.replace(/\n/g, " ")},${t.status}\n`);
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "4M_TASK_Export.csv"; link.click();
        };

        window.exportToPDF = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.addFont("https://fonts.gstatic.com/s/kanit/v15/npxDyY6_9Zku0609.ttf", "Kanit", "normal");
            doc.setFont("Kanit");
            doc.text("4M TASK MANAGEMENT REPORT", 14, 15);
            
            const rows = allTasks.map(t => [t.ors, t.title, t.status]);
            doc.autoTable({ head: [['ORS', 'Job Title', 'Status']], body: rows, startY: 25 });
            doc.save("4M_TASK_Report.pdf");
        };

        // Standard Functions
        window.openEdit = (id, ors, title, detail, status) => {
            document.getElementById('editId').value = id;
            document.getElementById('editOrs').value = ors.replace("ORS.", "");
            document.getElementById('editTitle').value = title;
            document.getElementById('editDetail').value = detail;
            document.getElementById('editStatus').value = status;
            document.getElementById('editModal').style.display = 'flex';
        };
        window.updateTask = async () => {
            await updateDoc(doc(db, "tasks", document.getElementById('editId').value), {
                ors: "ORS." + document.getElementById('editOrs').value,
                title: document.getElementById('editTitle').value,
                detail: document.getElementById('editDetail').value,
                status: document.getElementById('editStatus').value
            });
            document.getElementById('editModal').style.display = 'none';
        };
        window.deleteTask = async (id) => { if(confirm("ลบงานนี้?")) await deleteDoc(doc(db, "tasks", id)); };

        document.getElementById('cameraInput').onchange = async (e) => {
            for (let file of e.target.files) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    selectedPhotos.push(ev.target.result);
                    const img = document.createElement('img');
                    img.src = ev.target.result; img.style = "width:50px; height:50px; object-fit:cover; border-radius:5px;";
                    document.getElementById('preview-area').appendChild(img);
                };
                reader.readAsDataURL(file);
            }
        };
    </script>
</body>
</html>
