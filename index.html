<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4M TASK AI - v1.9.7 FIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #10b981; --primary-dark: #059669; --bg: #f8fafc; --text-main: #1e293b; --text-sub: #64748b; --shadow: 0 4px 20px rgba(0, 0, 0, 0.05); --status-wait: #ef4444; --status-doing: #f59e0b; --status-done: #10b981; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 50px; }
        .app-header { background: #fff; padding: 20px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .nav-tabs { display: flex; padding: 15px; gap: 8px; position: sticky; top: 0; background: var(--bg); z-index: 100; justify-content: center; }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 12px; background: #fff; color: var(--text-sub); cursor: pointer; box-shadow: var(--shadow); font-family: 'Kanit'; }
        .tab-btn.active { background: var(--primary); color: #fff; transform: scale(1.05); }
        .container { max-width: 700px; margin: 0 auto; padding: 0 15px; }
        .page-section { display: none; }
        .page-section.active { display: block; }
        .glass-card { background: #fff; border-radius: 20px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #e2e8f0; font-family: 'Kanit'; box-sizing: border-box; }
        .btn-main { background: var(--primary); color: #fff; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 600; cursor: pointer; }
        .task-card { background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: var(--shadow); border-left: 6px solid #ccc; }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin: 10px 0; }
        .gallery img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; cursor: pointer; }
        .ai-card { background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%); border: 1px solid #bbf7d0; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .ai-content { font-size: 0.95rem; line-height: 1.6; color: #064e3b; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div class="app-header">
        <h1>4M TASK AI</h1>
        <div style="font-size: 0.7rem; color: var(--text-sub);">v1.9.7 | 4mserver System | นาย ธิติ พุกวิลัย</div>
    </div>

    <div class="nav-tabs">
        <button id="btn-add" class="tab-btn active" onclick="showSection('add')">➕ เพิ่มงาน</button>
        <button id="btn-view" class="tab-btn" onclick="showSection('view')">📁 คลังงาน</button>
        <button id="btn-dash" class="tab-btn" onclick="showSection('dash')">📊 สรุปผล</button>
    </div>

    <div class="container">
        <div id="section-add" class="page-section active">
            <div class="glass-card">
                <input type="hidden" id="editId">
                <input type="text" id="taskFullInput" placeholder="เลข-เดือน ชื่องาน (เช่น 01-21 งานทางหลวง)">
                <button onclick="document.getElementById('cameraInput').click()" style="width:100%; padding:10px; border:2px dashed #ccc; border-radius:10px; background:none; margin-bottom:15px; cursor:pointer;">📸 แนบรูป (บีบอัดอัตโนมัติ)</button>
                <input type="file" id="cameraInput" accept="image/*" multiple style="display:none;">
                <div id="preview-area" style="display:flex; gap:8px; overflow-x:auto; margin-bottom:10px;"></div>
                <textarea id="taskDetail" rows="2" placeholder="รายละเอียด..."></textarea>
                <select id="taskStatus">
                    <option value="รอดำเนินการ">🔴 รอดำเนินการ</option>
                    <option value="กำลังทำ">🟡 กำลังทำ</option>
                    <option value="เสร็จสิ้น">🟢 เสร็จสิ้น</option>
                </select>
                <button id="saveBtn" class="btn-main" onclick="saveTask()">บันทึกข้อมูล</button>
            </div>
        </div>

        <div id="section-view" class="page-section">
            <input type="text" id="searchInput" placeholder="ค้นหา..." onkeyup="filterTasks()">
            <div id="task-container"></div>
        </div>

        <div id="section-dash" class="page-section">
            <div class="ai-card">
                <div id="aiOutput" class="ai-content">กดปุ่มเพื่อสรุปงานด้วย AI</div>
                <button class="btn-main" style="margin-top:15px; background:#059669;" onclick="getAISummary()">🪄 วิเคราะห์งานด้วย AI</button>
            </div>
            <canvas id="statusChart"></canvas>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBwNltx2biA-AdM44HjHay-4gO4N1RH_sQ", authDomain: "mytaskapp-pro.firebaseapp.com", projectId: "mytaskapp-pro", storageBucket: "mytaskapp-pro.firebasestorage.app", messagingSenderId: "189296604432", appId: "1:189296604432:web:31dabc3c5e363b2c96a195" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const AI_KEY = "AIzaSyC8QAz-QHKz8GOWVWzzkReSuIesulku7L4";
        let allTasks = [], selectedPhotos = [], statusChart;

        window.showSection = (name) => {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('section-' + name).classList.add('active');
            document.getElementById('btn-' + name).classList.add('active');
            if(name === 'dash') renderChart();
        };

        // ฟังก์ชันบีบอัดรูปภาพให้เล็กลงมาก (คุณภาพ 0.3)
        async function compressImage(base64) {
            return new Promise(res => {
                const img = new Image(); img.src = base64;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = 500; let w = img.width, h = img.height;
                    if (w > h) { if(w > max) { h *= max/w; w = max; } } else { if(h > max) { w *= max/h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    res(canvas.toDataURL('image/jpeg', 0.3));
                }
            });
        }

        window.saveTask = async () => {
            const raw = document.getElementById('taskFullInput').value;
            const editId = document.getElementById('editId').value;
            if(!raw) return alert("กรุณากรอกข้อมูล");

            const match = raw.match(/^(\d{1,2})\s*[-/]\s*(\d{1,2})\s+(.*)$/);
            const ors = match ? `ORS.${match[1]}/${match[2]}` : "ORS.00/00";
            const title = match ? match[3].trim() : raw;
            
            // บีบอัดรูปก่อนบันทึก
            const compressed = [];
            for(let p of selectedPhotos) { compressed.push(await compressImage(p)); }

            const data = { ors, title, detail: document.getElementById('taskDetail').value, status: document.getElementById('taskStatus').value, updatedAt: new Date().getTime(), photos: compressed };
            
            try {
                if(editId) { await updateDoc(doc(db, "tasks", editId), data); } 
                else { data.createdAt = new Date().getTime(); await addDoc(collection(db, "tasks"), data); }
                alert("บันทึกสำเร็จ!");
                location.reload();
            } catch (e) {
                alert("เกิดข้อผิดพลาด: ข้อมูลอาจใหญ่เกินไป (ลองลดจำนวนรูปภาพลง)");
            }
        };

        onSnapshot(query(collection(db, "tasks")), (snap) => {
            allTasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            allTasks.sort((a, b) => {
                const p = (s) => { const x = s.replace("ORS.","").split("/"); return { f: parseInt(x[0])||0, b: parseInt(x[1])||0 }; };
                const va = p(a.ors), vb = p(b.ors);
                return va.b !== vb.b ? va.b - vb.b : va.f - vb.f;
            });
            filterTasks();
        });

        window.filterTasks = () => {
            const container = document.getElementById('task-container');
            container.innerHTML = "";
            const search = document.getElementById('searchInput').value.toLowerCase();
            allTasks.filter(t => t.title.toLowerCase().includes(search) || t.ors.includes(search)).forEach(t => {
                let c = t.status === "เสร็จสิ้น" ? "var(--status-done)" : (t.status === "กำลังทำ" ? "var(--status-doing)" : "var(--status-wait)");
                container.innerHTML += `
                    <div class="task-card" style="border-left-color:${c}">
                        <div style="display:flex; justify-content:space-between;"><b>${t.ors}</b> <span style="color:${c}">${t.status}</span></div>
                        <div style="margin:8px 0; font-weight:600;">${t.title}</div>
                        <div class="gallery">${(t.photos||[]).map(p => `<img src="${p}" onclick="window.open('${p}')">`).join('')}</div>
                        <div style="display:flex; justify-content:flex-end; gap:12px; font-size:0.8rem;">
                            <span onclick="editTask('${t.id}')">✏️ แก้ไข</span>
                            <span style="color:red;" onclick="deleteTask('${t.id}')">🗑️ ลบ</span>
                        </div>
                    </div>`;
            });
        };

        window.getAISummary = async () => {
            const output = document.getElementById('aiOutput');
            output.innerText = "🤖 AI กำลังคิด...";
            const dataStr = allTasks.map(t => `${t.ors}: ${t.title} (${t.status})`).join('\n');
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${AI_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "สรุปงานทางหลวงเหล่านี้เป็นภาษาไทย แยกสิ่งที่เสร็จแล้วกับที่ค้าง:\n" + dataStr }] }] })
                });
                const json = await res.json();
                output.innerText = json.candidates[0].content.parts[0].text;
            } catch (e) { output.innerText = "AI เชื่อมต่อไม่ได้ชั่วคราว"; }
        };

        window.editTask = (id) => {
            const t = allTasks.find(x => x.id === id);
            document.getElementById('editId').value = t.id;
            document.getElementById('taskFullInput').value = `${t.ors.replace("ORS.","").replace("/","-")} ${t.title}`;
            document.getElementById('taskStatus').value = t.status;
            showSection('add');
        };

        window.deleteTask = async (id) => { if(confirm("ลบงานนี้?")) await deleteDoc(doc(db, "tasks", id)); };
        
        function renderChart() {
            const ctx = document.getElementById('statusChart').getContext('2d');
            const counts = { 'เสร็จสิ้น': 0, 'กำลังทำ': 0, 'รอดำเนินการ': 0 };
            allTasks.forEach(t => counts[t.status]++);
            if(statusChart) statusChart.destroy();
            statusChart = new Chart(ctx, { type: 'doughnut', data: { labels: Object.keys(counts), datasets: [{ data: Object.values(counts), backgroundColor: ['#10b981', '#f59e0b', '#ef4444'] }] } });
        }

        document.getElementById('cameraInput').onchange = (e) => {
            for (let f of e.target.files) {
                const r = new FileReader();
                r.onload = (ev) => {
                    selectedPhotos.push(ev.target.result);
                    const img = document.createElement('img'); img.src = ev.target.result; img.style = "width:40px; height:40px; object-fit:cover; border-radius:5px;";
                    document.getElementById('preview-area').appendChild(img);
                };
                r.readAsDataURL(f);
            }
        };
    </script>
</body>
</html>
