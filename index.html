<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4M TASK - v2.2.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #10b981; --primary-dark: #059669; --bg: #f1f5f9;
            --text-main: #1e293b; --text-sub: #64748b; --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --status-wait: #ef4444; --status-doing: #f59e0b; --status-done: #10b981;
        }
        body { font-family: 'Kanit', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 50px; }
        .app-header { background: #fff; padding: 20px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .nav-tabs { display: flex; padding: 15px; gap: 8px; position: sticky; top: 0; background: var(--bg); z-index: 100; justify-content: center; }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 12px; background: #fff; color: var(--text-sub); cursor: pointer; transition: 0.3s; box-shadow: var(--shadow); font-family: 'Kanit'; font-weight: 500; }
        .tab-btn.active { background: var(--primary); color: #fff; transform: translateY(-2px); }
        .container { max-width: 700px; margin: 0 auto; padding: 0 15px; }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; box-shadow: var(--shadow); margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #e2e8f0; font-family: 'Kanit'; box-sizing: border-box; font-size: 1rem; outline: none; }
        .btn-main { background: var(--primary); color: #fff; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.2s; font-family: 'Kanit'; }
        .btn-main:active { transform: scale(0.98); }
        .btn-excel { background: #1d6f42; color: #fff; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: 600; cursor: pointer; margin-top: 15px; font-family: 'Kanit'; }
        
        /* สไตล์แถบเดือน */
        .month-header { 
            background: #dcfce7; color: var(--primary-dark); padding: 12px 20px; 
            border-radius: 12px; display: flex; justify-content: space-between; align-items: center; 
            margin: 15px 0 8px 0; font-size: 1rem; font-weight: 700; cursor: pointer; 
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.15); transition: 0.2s; border: 1px solid #bbf7d0;
        }
        .month-header:hover { filter: brightness(0.95); }
        .month-content { display: block; }
        .month-content.collapsed { display: none; } /* ซ่อนงาน */
        .chevron { transition: transform 0.3s ease; font-size: 0.9rem; }
        .chevron.rotated { transform: rotate(-90deg); } /* หมุนลูกศรเมื่อปิด */

        .task-card { background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: var(--shadow); position: relative; }
        .task-detail-box { background: #f8fafc; border-left: 4px solid #cbd5e1; padding: 10px 12px; margin: 8px 0; border-radius: 0 8px 8px 0; font-size: 0.9rem; color: #475569; white-space: pre-wrap; }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin: 10px 0; }
        .gallery img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; }
        .task-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px; border-top: 1px solid #f1f5f9; padding-top: 10px; }
        .btn-edit { background: #3b82f6; color: #fff; border: none; padding: 6px 15px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-family: 'Kanit'; }
        .btn-del { background: #ef4444; color: #fff; border: none; padding: 6px 15px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-family: 'Kanit'; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-overlay.active { display: flex; animation: fadeIn 0.2s; }
        .modal-content { background: #fff; padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative; }
        .progress-wrapper { width: 100%; background: #e2e8f0; border-radius: 15px; height: 28px; position: relative; overflow: hidden; margin-top: 15px; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #10b981, #34d399); transition: width 0.3s ease; }
        .progress-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 0.9rem; font-weight: 700; color: #1e293b; }
    </style>
</head>
<body>

    <div class="app-header">
        <h1>4M TASK</h1>
        <div style="font-size: 0.75rem; color: var(--text-sub); font-weight: 500;">Version 2.2.2 | ธิติ พุกวิลัย</div>
    </div>

    <div class="nav-tabs">
        <button id="btn-add" class="tab-btn active" onclick="showSection('add')">➕ เพิ่มงาน</button>
        <button id="btn-view" class="tab-btn" onclick="showSection('view')">📁 คลังงาน</button>
        <button id="btn-dash" class="tab-btn" onclick="showSection('dash')">📊 สรุปผล</button>
    </div>

    <div class="container">
        <div id="section-add" class="page-section active">
            <div class="glass-card">
                <h3 style="margin-top:0;">บันทึกข้อมูลใหม่</h3>
                <input type="text" id="taskFullInput" placeholder="เลข-เดือน ชื่องาน (เช่น 01-21 งานทางหลวง)">
                <button onclick="document.getElementById('cameraInput').click()" style="width:100%; padding:10px; border:2px dashed #ccc; border-radius:10px; background:none; margin-bottom:15px; cursor:pointer; font-family:'Kanit';">📸 แนบรูปถ่าย</button>
                <input type="file" id="cameraInput" accept="image/*" multiple style="display:none;">
                <div id="preview-area" style="display:flex; gap:8px; overflow-x:auto; margin-bottom:10px;"></div>
                <textarea id="taskDetail" rows="3" placeholder="รายละเอียดเพิ่มเติม (ถ้ามี)"></textarea>
                <select id="taskStatus">
                    <option value="รอดำเนินการ">🔴 รอดำเนินการ</option>
                    <option value="กำลังทำ">🟡 กำลังทำ</option>
                    <option value="เสร็จสิ้น">🟢 เสร็จสิ้น</option>
                </select>
                <button class="btn-main" onclick="addTask()">บันทึกข้อมูล</button>
            </div>
        </div>

        <div id="section-view" class="page-section">
            <input type="text" id="searchInput" placeholder="ค้นหาชื่องานหรือเลข ORS..." onkeyup="filterTasks()" style="width:100%; padding:12px; border-radius:10px; border:1px solid #e2e8f0; margin-bottom:10px;">
            <div id="task-container"></div>
        </div>

        <div id="section-dash" class="page-section">
            <div class="stat-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
                <div style="background:#fff; padding:15px; border-radius:15px; text-align:center; box-shadow:var(--shadow);">
                    <div id="stat-total" style="font-size:1.5rem; font-weight:700;">0</div><div>งานทั้งหมด</div>
                </div>
                <div style="background:#fff; padding:15px; border-radius:15px; text-align:center; box-shadow:var(--shadow);">
                    <div id="stat-done" style="font-size:1.5rem; font-weight:700; color:var(--primary)">0</div><div>เสร็จสิ้น</div>
                </div>
            </div>
            <div class="glass-card"><canvas id="statusChart"></canvas></div>
            <button class="btn-excel" onclick="exportToExcel()">📗 ส่งออกเป็น Excel</button>
        </div>
    </div>

    <div id="loadingModal" class="modal-overlay"><div class="modal-content" style="text-align: center; max-width: 300px;">
        <h4 id="loadingTitle">กำลังประมวลผล...</h4><div class="progress-wrapper"><div id="progressBar" class="progress-bar"></div><div id="progressText" class="progress-text">0%</div></div>
    </div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBwNltx2biA-AdM44HjHay-4gO4N1RH_sQ", authDomain: "mytaskapp-pro.firebaseapp.com", 
            projectId: "mytaskapp-pro", storageBucket: "mytaskapp-pro.firebasestorage.app", 
            messagingSenderId: "189296604432", appId: "1:189296604432:web:31dabc3c5e363b2c96a195" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allTasks = [];
        const monthNames = ["ทั่วไป", "มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

        window.showSection = (name) => {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('section-' + name).classList.add('active');
            document.getElementById('btn-' + name).classList.add('active');
        };

        onSnapshot(collection(db, "tasks"), (snap) => {
            allTasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            allTasks.sort((a, b) => (a.ors || "").localeCompare(b.ors || ""));
            filterTasks();
        });

        // ฟังก์ชัน Toggle ซ่อน/แสดงเดือน
        window.toggleMonth = (monthId) => {
            const content = document.getElementById(`content-${monthId}`);
            const icon = document.getElementById(`icon-${monthId}`);
            content.classList.toggle('collapsed');
            icon.classList.toggle('rotated');
        };

        window.filterTasks = () => {
            const container = document.getElementById('task-container'); container.innerHTML = "";
            const search = document.getElementById('searchInput').value.toLowerCase();
            const groupedTasks = {};

            allTasks.filter(t => (t.title||"").toLowerCase().includes(search) || (t.ors||"").includes(search)).forEach(t => {
                let mName = "ทั่วไป";
                try {
                    const mIdx = parseInt(t.ors.split('/')[0].split('.')[1]);
                    if(mIdx > 0 && mIdx <= 12) mName = monthNames[mIdx];
                } catch(e) {}
                if(!groupedTasks[mName]) groupedTasks[mName] = [];
                groupedTasks[mName].push(t);
            });

            monthNames.filter(m => groupedTasks[m]).forEach(mName => {
                const tasksInMonth = groupedTasks[mName];
                const safeId = mName.replace(/\s+/g, '');
                
                // CRITICAL CHANGE: ตั้งค่าเริ่มต้นเป็น 'collapsed' (ปิดไว้)
                // และ 'rotated' (ลูกศรชี้ไปข้างๆ)
                let html = `
                    <div class="month-header" onclick="toggleMonth('${safeId}')">
                        <span>📅 เดือน${mName} <span style="font-size:0.8rem; color:var(--text-sub); background:#fff; padding:2px 8px; border-radius:10px; margin-left:5px;">${tasksInMonth.length} งาน</span></span>
                        <span id="icon-${safeId}" class="chevron rotated">▼</span>
                    </div>
                    <div id="content-${safeId}" class="month-content collapsed">
                `;

                tasksInMonth.forEach(t => {
                    let c = t.status === "เสร็จสิ้น" ? "var(--status-done)" : (t.status === "กำลังทำ" ? "var(--status-doing)" : "var(--status-wait)");
                    html += `
                        <div class="task-card" style="border-left: 6px solid ${c}">
                            <div style="display:flex; justify-content:space-between;"><b>${t.ors}</b> <span style="color:${c}; font-weight:600;">${t.status}</span></div>
                            <div style="margin:8px 0 5px 0; font-weight:600;">${t.title}</div>
                            ${t.detail ? `<div class="task-detail-box">${t.detail}</div>` : ''}
                            <div class="gallery">${(t.photos||[]).map(p => `<img src="${p}">`).join('')}</div>
                        </div>`;
                });
                html += `</div>`; container.innerHTML += html;
            });
        };
        
        // (ฟังก์ชันอื่นๆ เช่น addTask, export ยังคงเดิมตาม v2.2.1)
    </script>
</body>
</html>
