<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4M TASK - ULTIMATE EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #10b981; --primary-dark: #059669; --bg: #f8fafc;
            --text-main: #1e293b; --text-sub: #64748b; --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        body { font-family: 'Kanit', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 50px; }
        
        .app-header { background: #fff; padding: 20px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .app-header h1 { margin: 0; font-size: 1.5rem; color: var(--primary-dark); }

        /* Navigation */
        .nav-tabs { display: flex; overflow-x: auto; padding: 15px; gap: 8px; sticky: top; background: var(--bg); z-index: 100; }
        .tab-btn { padding: 10px 18px; border: none; border-radius: 12px; background: #fff; color: var(--text-sub); white-space: nowrap; cursor: pointer; transition: 0.3s; box-shadow: var(--shadow); font-family: 'Kanit'; }
        .tab-btn.active { background: var(--primary); color: #fff; }

        .container { max-width: 700px; margin: 0 auto; padding: 0 15px; }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Dashboard */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #fff; padding: 20px; border-radius: 15px; text-align: center; box-shadow: var(--shadow); }
        .chart-container { background: #fff; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: var(--shadow); }

        /* Form */
        .glass-card { background: #fff; border-radius: 20px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #e2e8f0; font-family: 'Kanit'; box-sizing: border-box; }
        .btn-main { background: var(--primary); color: #fff; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 600; cursor: pointer; }

        /* Search & Filter */
        .search-box { display: flex; gap: 10px; margin-bottom: 15px; }
        .search-box input { margin-bottom: 0; }

        /* Task Card */
        .task-card { background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 15px; border-left: 5px solid var(--primary); box-shadow: var(--shadow); }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin: 10px 0; }
        .gallery img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; }

        /* Slider & Modal */
        .slider-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; justify-content: center; align-items: center; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; width: 90%; max-width: 500px; border-radius: 20px; padding: 20px; max-height: 80vh; overflow-y: auto; }
        
        /* Calendar Placeholder */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; background: #fff; padding: 10px; border-radius: 15px; box-shadow: var(--shadow); }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; border-radius: 8px; cursor: pointer; }
        .cal-has-task { background: #dcfce7; color: var(--primary-dark); font-weight: 600; }
    </style>
</head>
<body>

    <div class="app-header">
        <h1>4M TASK ULTIMATE</h1>
        <div style="font-size: 0.7rem; color: var(--text-sub);">Version 1.7.0 | พัฒนาโดย นาย ธิติ พุกวิลัย</div>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="showSection('dash')">📊 สรุปผล</button>
        <button class="tab-btn" onclick="showSection('add')">➕ เพิ่มงาน</button>
        <button class="tab-btn" onclick="showSection('view')">📁 คลังงาน</button>
        <button class="tab-btn" onclick="showSection('cal')">📅 ปฏิทิน</button>
    </div>

    <div class="container">
        <div id="section-dash" class="page-section active">
            <div class="stat-grid">
                <div class="stat-card"><div style="color:var(--text-sub); font-size:0.8rem;">งานทั้งหมด</div><div id="stat-total" style="font-size:1.5rem; font-weight:600;">0</div></div>
                <div class="stat-card"><div style="color:var(--primary); font-size:0.8rem;">เสร็จสิ้น</div><div id="stat-done" style="font-size:1.5rem; font-weight:600; color:var(--primary);">0</div></div>
            </div>
            <div class="chart-container">
                <canvas id="statusChart"></canvas>
            </div>
            <button class="btn-main" style="background:#334155;" onclick="exportToCSV()">📤 ส่งออกข้อมูลเป็น Excel (.csv)</button>
        </div>

        <div id="section-add" class="page-section">
            <div class="glass-card">
                <div style="display:flex; align-items:center; margin-bottom:10px;">
                    <div style="background:#f1f5f9; padding:12px; border-radius:10px 0 0 10px; font-weight:600; border:1px solid #e2e8f0; border-right:none;">ORS.</div>
                    <input type="text" id="taskOrs" placeholder="03/01" style="margin-bottom:0; border-radius:0 10px 10px 0;">
                </div>
                <button onclick="document.getElementById('cameraInput').click()" style="width:100%; padding:10px; border:2px dashed #ccc; border-radius:10px; background:none; margin-bottom:15px; font-family:inherit; cursor:pointer;">📸 แนบรูปถ่าย</button>
                <input type="file" id="cameraInput" accept="image/*" multiple style="display:none;">
                <div id="preview-area" style="display:flex; gap:5px; overflow-x:auto; margin-bottom:10px;"></div>
                <input type="text" id="taskTitle" placeholder="ชื่อหัวข้องาน">
                <textarea id="taskDetail" rows="3" placeholder="รายละเอียด"></textarea>
                <select id="taskStatus">
                    <option value="รอดำเนินการ">รอดำเนินการ</option>
                    <option value="กำลังทำ">กำลังทำ</option>
                    <option value="เสร็จสิ้น">เสร็จสิ้น</option>
                </select>
                <button class="btn-main" onclick="addTask()">บันทึกงาน</button>
            </div>
        </div>

        <div id="section-view" class="page-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="ค้นหาชื่องาน หรือเลข ORS..." onkeyup="filterTasks()">
            </div>
            <select id="filterStatus" onchange="filterTasks()" style="margin-bottom:15px;">
                <option value="ทั้งหมด">แสดงสถานะ: ทั้งหมด</option>
                <option value="รอดำเนินการ">รอดำเนินการ</option>
                <option value="กำลังทำ">กำลังทำ</option>
                <option value="เสร็จสิ้น">เสร็จสิ้น</option>
            </select>
            <div id="task-container"></div>
        </div>

        <div id="section-cal" class="page-section">
            <h3 id="cal-month-name" style="text-align:center;"></h3>
            <div class="calendar-grid" id="calendar-body"></div>
            <div id="cal-task-list" style="margin-top:20px;"></div>
        </div>
    </div>

    <div id="sliderOverlay" class="slider-overlay" onclick="this.style.display='none'">
        <img id="sliderImg" style="max-width:90%; max-height:80%; object-fit:contain;">
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>แก้ไขงาน</h3>
            <input type="hidden" id="editId">
            <input type="text" id="editOrs" placeholder="เลข ORS">
            <input type="text" id="editTitle" placeholder="ชื่องาน">
            <textarea id="editDetail" rows="3"></textarea>
            <select id="editStatus">
                <option value="รอดำเนินการ">รอดำเนินการ</option>
                <option value="กำลังทำ">กำลังทำ</option>
                <option value="เสร็จสิ้น">เสร็จสิ้น</option>
            </select>
            <div style="display:flex; gap:10px;">
                <button class="btn-main" onclick="updateTask()">อัปเดต</button>
                <button class="btn-main" style="background:#ccc;" onclick="document.getElementById('editModal').style.display='none'">ปิด</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBwNltx2biA-AdM44HjHay-4gO4N1RH_sQ",
            authDomain: "mytaskapp-pro.firebaseapp.com",
            projectId: "mytaskapp-pro",
            storageBucket: "mytaskapp-pro.firebasestorage.app",
            messagingSenderId: "189296604432",
            appId: "1:189296604432:web:31dabc3c5e363b2c96a195",
            measurementId: "G-MRE5GH4CYH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allTasks = [];
        let selectedPhotos = [];
        let statusChart;

        const monthNames = ["", "มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

        window.showSection = (name) => {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('section-' + name).classList.add('active');
            event.target.classList.add('active');
            if(name === 'dash') updateDashboard();
            if(name === 'cal') renderCalendar();
        };

        // Firebase Sync
        onSnapshot(query(collection(db, "tasks"), orderBy("ors", "asc")), (snap) => {
            allTasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            filterTasks();
            updateDashboard();
        });

        // 1. Dashboard Logic
        function updateDashboard() {
            const total = allTasks.length;
            const done = allTasks.filter(t => t.status === 'เสร็จสิ้น').length;
            const doing = allTasks.filter(t => t.status === 'กำลังทำ').length;
            const pending = allTasks.filter(t => t.status === 'รอดำเนินการ').length;

            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-done').innerText = done;

            const ctx = document.getElementById('statusChart').getContext('2d');
            if(statusChart) statusChart.destroy();
            statusChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['เสร็จสิ้น', 'กำลังทำ', 'รอดำเนินการ'],
                    datasets: [{
                        data: [done, doing, pending],
                        backgroundColor: ['#10b981', '#f59e0b', '#ef4444']
                    }]
                },
                options: { plugins: { legend: { position: 'bottom' } } }
            });
        }

        // 2. Search & Filter
        window.filterTasks = () => {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('filterStatus').value;
            const container = document.getElementById('task-container');
            container.innerHTML = "";
            
            let lastGroup = "";
            const filtered = allTasks.filter(t => {
                const matchesSearch = t.title.toLowerCase().includes(searchTerm) || t.ors.toLowerCase().includes(searchTerm);
                const matchesStatus = statusFilter === 'ทั้งหมด' || t.status === statusFilter;
                return matchesSearch && matchesStatus;
            });

            filtered.forEach(t => {
                const mIdx = parseInt(t.ors.replace("ORS.", "").substring(0, 2));
                const mName = monthNames[mIdx] || "อื่นๆ";
                if(lastGroup !== mName) {
                    lastGroup = mName;
                    container.innerHTML += `<div style="background:#dcfce7; padding:5px 15px; border-radius:20px; display:inline-block; margin:15px 0 5px 0; font-size:0.8rem; font-weight:600;">เดือน${mName}</div>`;
                }
                container.innerHTML += `
                    <div class="task-card">
                        <div style="display:flex; justify-content:space-between; font-size:0.8rem;">
                            <b style="color:var(--primary-dark);">${t.ors}</b>
                            <span style="color:${t.status==='เสร็จสิ้น'?'green':'orange'}">${t.status}</span>
                        </div>
                        <div style="font-weight:600; margin:5px 0;">${t.title}</div>
                        <div class="gallery">${(t.photos||[]).map(p => `<img src="${p}" onclick="zoomImg('${p}')">`).join('')}</div>
                        <div style="display:flex; gap:10px; margin-top:10px; font-size:0.8rem;">
                            <span style="color:blue; cursor:pointer;" onclick="openEdit('${t.id}','${t.ors}','${t.title}','${t.detail}','${t.status}')">แก้ไข</span>
                            <span style="color:red; cursor:pointer;" onclick="deleteTask('${t.id}')">ลบ</span>
                        </div>
                    </div>`;
            });
        };

        // 3. Calendar Logic (Simple)
        function renderCalendar() {
            const now = new Date();
            document.getElementById('cal-month-name').innerText = monthNames[now.getMonth()+1] + " " + now.getFullYear();
            const body = document.getElementById('calendar-body');
            body.innerHTML = "";
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            
            for(let i=1; i<=daysInMonth; i++) {
                const dayStr = i.toString().padStart(2, '0');
                const monthStr = (now.getMonth()+1).toString().padStart(2, '0');
                const hasTask = allTasks.some(t => t.ors.includes(`${monthStr}/`) && t.ors.split('/')[1] == i);
                body.innerHTML += `<div class="cal-day ${hasTask?'cal-has-task':''}" onclick="showDayTasks('${monthStr}/${dayStr}')">${i}</div>`;
            }
        }

        // 4. Export to CSV
        window.exportToCSV = () => {
            let csv = "ORS,Title,Detail,Status\n";
            allTasks.forEach(t => {
                csv += `${t.ors},${t.title},${t.detail.replace(/\n/g, " ")},${t.status}\n`;
            });
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "4M_TASK_Export.csv";
            link.click();
        };

        // Standard Functions
        window.addTask = async () => {
            const ors = "ORS." + document.getElementById('taskOrs').value;
            await addDoc(collection(db, "tasks"), {
                ors, title: document.getElementById('taskTitle').value,
                detail: document.getElementById('taskDetail').value,
                status: document.getElementById('taskStatus').value,
                photos: selectedPhotos, createdAt: new Date().getTime()
            });
            alert("บันทึกแล้ว!");
            location.reload();
        };

        window.zoomImg = (url) => { document.getElementById('sliderImg').src = url; document.getElementById('sliderOverlay').style.display = 'flex'; };
        window.openEdit = (id, ors, title, detail, status) => {
            document.getElementById('editId').value = id;
            document.getElementById('editOrs').value = ors.replace("ORS.", "");
            document.getElementById('editTitle').value = title;
            document.getElementById('editDetail').value = detail;
            document.getElementById('editStatus').value = status;
            document.getElementById('editModal').style.display = 'flex';
        };
        window.updateTask = async () => {
            await updateDoc(doc(db, "tasks", document.getElementById('editId').value), {
                ors: "ORS." + document.getElementById('editOrs').value,
                title: document.getElementById('editTitle').value,
                detail: document.getElementById('editDetail').value,
                status: document.getElementById('editStatus').value
            });
            document.getElementById('editModal').style.display = 'none';
        };
        window.deleteTask = async (id) => { if(confirm("ลบงานนี้?")) await deleteDoc(doc(db, "tasks", id)); };

        // Handle Images
        document.getElementById('cameraInput').onchange = async (e) => {
            for (let file of e.target.files) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    selectedPhotos.push(ev.target.result);
                    const img = document.createElement('img');
                    img.src = ev.target.result; img.style = "width:50px; height:50px; object-fit:cover; border-radius:5px;";
                    document.getElementById('preview-area').appendChild(img);
                };
                reader.readAsDataURL(file);
            }
        };
    </script>
</body>
</html>
