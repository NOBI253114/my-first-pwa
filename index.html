<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyTaskApp Pro</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --success: #4cc9f0;
            --danger: #f72585;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
        }

        body { 
            font-family: 'Chakra Petch', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 20px 15px 100px 15px; 
            color: #2b2d42;
        }

        h1 { 
            text-align: center; 
            font-weight: 700; 
            color: var(--primary); 
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
        }

        /* Glassmorphism Form */
        .form-container { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 20px; 
            margin-bottom: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .form-title { font-weight: 600; font-size: 1.2rem; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }

        input, textarea, select { 
            width: 100%; padding: 12px; margin-bottom: 12px; 
            border: 1.5px solid #e0e0e0; border-radius: 12px; 
            font-family: inherit; font-size: 1rem; transition: 0.3s;
        }

        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1); }

        /* Camera Section */
        .camera-box {
            width: 100%; background: #f0f0f0; border-radius: 12px;
            margin-bottom: 15px; overflow: hidden; position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 150px; border: 2px dashed #ccc;
        }

        #photo-preview { width: 100%; display: none; border-radius: 10px; margin-top: 10px; }

        .btn-camera {
            background: #6c757d; color: white; border: none; padding: 10px 15px;
            border-radius: 30px; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 8px;
        }

        .add-btn { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; border: none; padding: 15px; border-radius: 12px; 
            font-weight: 700; width: 100%; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.3);
        }

        /* Task Cards */
        .card { 
            background: var(--card-bg); border-radius: 18px; padding: 18px; 
            margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            position: relative; overflow: hidden; animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .task-img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; margin-bottom: 12px; }

        .status-tag { 
            position: absolute; top: 15px; right: 15px; padding: 4px 12px; 
            border-radius: 20px; font-size: 0.75rem; color: white; font-weight: 600;
        }

        .status-รอดำเนินการ { background: var(--success); }
        .status-กำลังทำ { background: #f7b731; }
        .status-เสร็จสิ้น { background: #20bf6b; }

        .task-title { font-size: 1.2rem; font-weight: 700; margin: 10px 0; color: #1e293b; }
        .task-meta { font-size: 0.85rem; color: #64748b; display: flex; flex-direction: column; gap: 5px; }

        .delete-btn { color: var(--danger); font-size: 0.9rem; cursor: pointer; margin-top: 15px; display: inline-block; font-weight: 600; }

    </style>
</head>
<body>

    <h1>MyTaskApp PRO</h1>
    
    <div class="form-container">
        <div class="form-title">🚀 สร้างโปรเจกต์ใหม่</div>
        
        <div class="camera-box">
            <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">
            <button class="btn-camera" onclick="document.getElementById('cameraInput').click()">
                📸 ถ่ายรูปประกอบ
            </button>
            <img id="photo-preview" src="">
        </div>

        <input type="text" id="taskTitle" placeholder="ชื่องานของคุณ...">
        <textarea id="taskDetail" placeholder="รายละเอียดงาน..."></textarea>
        
        <select id="taskStatus">
            <option value="รอดำเนินการ">รอดำเนินการ</option>
            <option value="กำลังทำ">กำลังทำ</option>
            <option value="เสร็จสิ้น">เสร็จสิ้น</option>
        </select>
        
        <button class="add-btn" onclick="addTask()">บันทึกข้อมูล</button>
    </div>

    <div id="task-container"></div>

    <script>
        let currentPhotoData = "";

        // จัดการเรื่องรูปภาพ
        document.getElementById('cameraInput').onchange = function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                currentPhotoData = event.target.result;
                const preview = document.getElementById('photo-preview');
                preview.src = currentPhotoData;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        };

        function addTask() {
            const title = document.getElementById('taskTitle').value;
            const detail = document.getElementById('taskDetail').value;
            const status = document.getElementById('taskStatus').value;

            if (!title) return alert("กรุณาระบุชื่องาน");

            const newTask = {
                id: Date.now(),
                title, detail, status,
                photo: currentPhotoData,
                time: new Date().toLocaleString('th-TH')
            };

            const tasks = JSON.parse(localStorage.getItem('proTasks')) || [];
            tasks.unshift(newTask);
            localStorage.setItem('proTasks', JSON.stringify(tasks));

            // Reset Form
            document.getElementById('taskTitle').value = "";
            document.getElementById('taskDetail').value = "";
            document.getElementById('photo-preview').style.display = 'none';
            currentPhotoData = "";
            
            loadTasks();
        }

        function loadTasks() {
            const container = document.getElementById('task-container');
            const tasks = JSON.parse(localStorage.getItem('proTasks')) || [];
            container.innerHTML = "";

            tasks.forEach(t => {
                container.innerHTML += `
                    <div class="card">
                        <span class="status-tag status-${t.status}">${t.status}</span>
                        ${t.photo ? `<img src="${t.photo}" class="task-img">` : ''}
                        <div class="task-title">${t.title}</div>
                        <div class="job-detail" style="font-size: 0.95rem; color: #444; margin-bottom: 10px;">${t.detail}</div>
                        <div class="task-meta">
                            <span>📅 ${t.time}</span>
                        </div>
                        <span class="delete-btn" onclick="deleteTask(${t.id})">ลบรายการนี้</span>
                    </div>
                `;
            });
        }

        function deleteTask(id) {
            if(confirm("ยืนยันการลบ?")) {
                let tasks = JSON.parse(localStorage.getItem('proTasks'));
                tasks = tasks.filter(t => t.id !== id);
                localStorage.setItem('proTasks', JSON.stringify(tasks));
                loadTasks();
            }
        }

        window.onload = loadTasks;
    </script>
</body>
</html>
